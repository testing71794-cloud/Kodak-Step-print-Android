# Appium Gestures — isolated module (automation/appium-gestures/)
# Override any value via CLI: -Dappium.server.url=... -Dandroid.device.udid=...

# Appium 2.x server (start separately: appium --address 127.0.0.1 --port 4723)
appium.server.url=http://127.0.0.1:4723

# Physical device serial (adb devices). Leave empty to use first connected device.
android.device.udid=

# Kodak Step Prints — attach to running app session (no reinstall)
app.package=com.kodak.steptouch
app.activity=
app.no.reset=true
app.full.reset=false
auto.launch=false

# Gesture target (percent of viewport). ~42% Y avoids bottom edit toolbar.
gesture.center.x.percent=50
gesture.center.y.percent=42
gesture.inner.offset.pixels=60
gesture.outer.offset.pixels=140
gesture.duration.ms=650

# pinch | pinch-in | pinch-out | both
gesture.mode=both

# Screenshots written under target/screenshots/
screenshots.dir=target/screenshots
screenshots.enabled=true
