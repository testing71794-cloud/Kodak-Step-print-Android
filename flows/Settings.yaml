appId: com.kodak.steptouch
name: Settings Screen - open settings menu
---
- waitForAnimationToEnd
# Tap settings (gear) – top-left (ATP SE_01).
- tapOn:
    id: "linearLayoutCross"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: ".*(?i)(quick tips|support|share settings|order paper refill|legal|about).*"
    timeout: 30000
- back
- waitForAnimationToEnd
