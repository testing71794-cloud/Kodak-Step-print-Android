# Stateful session — one app journey per QA session
execution:
  session_mode: true
  continue_on_failure: true
  clear_state_only_on_session_start: true
  max_recovery_attempts: 2
  retry_module_after_recovery: true
  adaptive_wait_timeout_sec: 12
  adaptive_poll_interval_sec: 0.35

modules:
  - name: Onboarding
    folder: onboarding
    enabled: true
  - name: SignIn
    folder: signup-login
    enabled: true
  - name: Connection
    folder: connection
    enabled: true
    skip_if_folder_missing: true
  - name: Camera
    folder: camera
    enabled: true
  - name: Collage
    folder: collage
    enabled: true
  - name: Gallery
    folder: gallery
    enabled: true
    skip_if_folder_missing: true
  - name: PreCut
    folder: precut
    enabled: true
    skip_if_folder_missing: true
  - name: Editing
    folder: editing
    enabled: true
  - name: Printing
    folder: printing
    enabled: true
    skip_if_folder_missing: true
  - name: Settings
    folder: settings
    enabled: true
