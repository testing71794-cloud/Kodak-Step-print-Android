# PR_02 – Multiple Copies Print (same connect/print path as PR_01 + 3 copies)
# Env: BT_DEVICE_NAME
appId: com.kodak.steptouch
name: PR_02 - Multiple Copies Print
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: ../connection/subflows/reach_gallery_after_onboarding_skip_for_connection.yaml
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- runFlow:
    when:
      notVisible: ".*(?i)my gallery.*"
    commands:
      - pressKey: back
      - pressKey: back
      - tapOn:
          id: back_button
          optional: true
      - tapOn:
          id: linearLayoutBack
          optional: true
- extendedWaitUntil:
    visible: ".*(?i)my gallery.*"
    timeout: 2000
- tapOn:
    id: "imageViewConnection"
- waitForAnimationToEnd    
- waitForAnimationToEnd 
- tapOn:
    point: 21%,13%

- runFlow: subflows/pairing_optional.yaml
- waitForAnimationToEnd
- tapOn:
    point: "50%, 45%"
    label: Gallery thumbnail
- runFlow:
    when:
      visible: "Time to Fine-Tune"
    commands:
      - tapOn:
          text: "Ok"
          optional: true
      - tapOn:
          text: "OK"
          optional: true
- tapOn:
    text: "Ok"
    optional: true
- tapOn:
    text: "OK"
    optional: true

- waitForAnimationToEnd
- tapOn:
    point: 75%,90%
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Number of Copies"
    commands:
      - tapOn:
          id: "textViewAddCopy"
      - tapOn:
          id: "textViewAddCopy"
      - assertVisible:
          id: "text_noOfcopies"
          text: "3"
      - tapOn: "Print"
      - waitForAnimationToEnd
- waitForAnimationToEnd

- waitForAnimationToEnd
- waitForAnimationToEnd
- repeat:
    times: 6
    commands:
      - runFlow:
          when:
            visible: "OK"
          commands:
            - tapOn: "OK"
            - waitForAnimationToEnd
- assertVisible:
    id: "ivItemGridImage"
    index: 6
- runFlow:
    when:
      visible: "Print Successful"
    commands:
      - assertVisible: "Print Successful"
