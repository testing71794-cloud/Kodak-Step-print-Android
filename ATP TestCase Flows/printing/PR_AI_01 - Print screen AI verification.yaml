# TC_ID: PR_AI_01 - Print screen AI verification
# ATP Steps: gallery → photo → print preview → AI verify; optional print success AI verify
# ATP Expected: OpenRouter confirms print preview UI and (when printer available) success screen
# Env: BT_DEVICE_NAME
appId: com.kodak.steptouch
name: PR_AI_01 - Print screen AI verification
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: ../connection/subflows/reach_gallery_after_onboarding_skip_for_connection.yaml
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- runFlow:
    when:
      notVisible: ".*(?i)my gallery.*"
    commands:
      - pressKey: back
      - pressKey: back
      - tapOn:
          id: back_button
          optional: true
      - tapOn:
          id: linearLayoutBack
          optional: true
- extendedWaitUntil:
    visible: ".*(?i)my gallery.*"
    timeout: 2000
- tapOn:
    point: "50%, 45%"
    label: Gallery thumbnail
- runFlow:
    when:
      visible: "Time to Fine-Tune"
    commands:
      - tapOn:
          text: "Ok"
          optional: true
      - tapOn:
          text: "OK"
          optional: true
- tapOn:
    text: "Ok"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    point: "88%, 92%"
    label: Print bottom-right
- tapOn: "Print"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: 21%,13%
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: subflows/pairing_optional.yaml
- waitForAnimationToEnd:
    timeout: 2000
- repeat:
    times: 6
    commands:
      - runFlow:
          when:
            visible: "OK"
          commands:
            - tapOn: "OK"
            - waitForAnimationToEnd:
                timeout: 2000
- runFlow: subflows/assert_print_progress_grid.yaml
- takeScreenshot: PR_AI_01_print_preview
- runFlow:
    file: subflows/verify_print_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: PR_AI_01_print_preview
      SCREEN_LABEL: PR_AI_01 Print preview
      SCREEN_PROFILE: print_preview
- runFlow:
    when:
      visible: "Print Successful"
    commands:
      - takeScreenshot: PR_AI_01_print_success
      - runFlow:
          file: subflows/verify_print_screen_with_ai.yaml
          env:
            SCREEN_BASENAME: PR_AI_01_print_success
            SCREEN_LABEL: PR_AI_01 Print Successful
            SCREEN_PROFILE: print_success
