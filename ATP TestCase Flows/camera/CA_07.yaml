# TC_ID: CA_07
# ATP Name: front facing camera > capture no flash
# ATP Steps: 1. Open app → 2. tap on the camera icon located at the bottom-right of the screen → 3. tap on the camera flip icon located at the bottom-right of the screen → 4. tap on the flash icon until the icon has a slash → 5. capture image
# ATP Expected: User should be able to capture using the front facing camera. Flash should not engage
appId: com.kodak.steptouch
name: CA_07 - Capture using front camera with no flash
---
# Step 1: open app and reach gallery.
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_camera.yaml
# Step 2: tap on the camera icon located at the bottom-right of the screen.
- runFlow: subflows/open_camera_bottom_right.yaml
# Step 3: tap on the camera flip icon located at the bottom-right of the screen.
- tapOn:
    id: "imgFlipCamera"
# Step 5: capture image.
- tapOn:
    id: "capture_img"
