appId: com.kodak.steptouch
---
- runFlow:
    when:
      visible:
        id: img_flash
    commands:
      - tapOn:
          id: img_flash
- runFlow:
    when:
      visible:
        id: imageViewFlash
    commands:
      - tapOn:
          id: imageViewFlash
- tapOn:
    point: "94%, 7%"
    optional: true
    label: Flash control fallback
