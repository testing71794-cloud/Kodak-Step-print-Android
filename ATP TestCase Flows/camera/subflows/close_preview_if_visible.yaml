appId: com.kodak.steptouch
---
# After capture: dismiss preview / fine-tune overlays (CA_04 step 9).
- runFlow:
    when:
      visible: "Ok"
    commands:
      - tapOn:
          text: "Ok"
          optional: true
      - tapOn:
          text: "OK"
          optional: true
- runFlow:
    when:
      visible: "X"
    commands:
      - tapOn: "X"
- runFlow:
    when:
      visible: "Close"
    commands:
      - tapOn: "Close"
