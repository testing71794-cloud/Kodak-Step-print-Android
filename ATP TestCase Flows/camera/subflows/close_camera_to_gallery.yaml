appId: com.kodak.steptouch
---
- runFlow:
    when:
      visible:
        id: back_button
    commands:
      - tapOn:
          id: back_button
- runFlow:
    when:
      visible: "Close"
    commands:
      - tapOn: "Close"
- extendedWaitUntil:
    visible:
      text: ".*(?i)my gallery.*"
    timeout: 2000
