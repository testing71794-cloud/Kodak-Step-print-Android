appId: com.kodak.steptouch
---
# Backward-compatible wrapper — delegates to generic visual pair verifier (filter profile).
- runFlow:
    file: verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ${BEFORE_BASENAME}
      AFTER_BASENAME: ${AFTER_BASENAME}
      VERIFY_LABEL: ${FILTER_LABEL}
      VERIFY_PROFILE: filter
