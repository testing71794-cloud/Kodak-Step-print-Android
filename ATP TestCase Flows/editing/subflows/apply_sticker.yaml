appId: com.kodak.steptouch
---
# Stickers UI (multi-step, per device):
# 1) "Select Sticker Category" — Mother Day | Spring | Graduation | Fathers Day
# 2) Category picker (e.g. "Graduation") — sticker carousel, X + checkmark; assets may need download
# 3) Sticker on preview — confirm with checkmark; Done if returned to category screen
- tapOn: "Stickers"
- extendedWaitUntil:
    visible:
      text: ".*(?i)select sticker category.*"
    timeout: 15000
    optional: true
- extendedWaitUntil:
    visible:
      id: "flFrameCategory"
    timeout: 15000
    optional: true
- extendedWaitUntil:
    visible:
      id: "tvFrameCategory"
    timeout: 15000
    optional: true
- runFlow: apply_sticker_from_category.yaml
