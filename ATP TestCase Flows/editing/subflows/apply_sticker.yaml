appId: com.kodak.steptouch
---
# Stickers UI (multi-step, per device):
# 1) "Select Sticker Category" — Graduation, Fathers Day, Summer, Patriotic…
# 2) Category carousel — sticker thumbnails; first asset often pre-cached
# 3) Confirm checkmark → category screen → Filter returns to edit toolbar
# Use "Summer" (colorful flip-flops) — visually distinct from the base test photo
# so the AI pair check can clearly detect the added sticker.
- runFlow: stickers/open_stickers_tool.yaml
- runFlow:
    file: stickers/apply_sticker_full.yaml
    env:
      STICKER_CATEGORY: Summer
      STICKER_CATEGORY_INDEX: 2
      STICKER_CATEGORY_POINT: "50%,72%"
      STICKER_THUMB_INDEX: 0
