appId: com.kodak.steptouch
---
# Extended tools (Blur, Text, Paint): confirm via checkmark — never yellow Done (exits edit).
# Fallback: tap Filter when still on a tool panel.
- runFlow:
    when:
      visible:
        id: "saveRecentEditImageView"
    commands:
      - tapOn:
          id: "saveRecentEditImageView"
      - waitForAnimationToEnd:
          timeout: 1500
- runFlow:
    when:
      visible:
        text: "(?is).*no\\s+blur.*"
    commands:
      - tapOn: "Filter"
      - waitForAnimationToEnd:
          timeout: 1500
- runFlow:
    when:
      visible:
        text: ".*(?i)abc.*"
    commands:
      - tapOn: "Filter"
      - waitForAnimationToEnd:
          timeout: 1500
- runFlow:
    when:
      visible:
        id: "undoPaintImageView"
    commands:
      - tapOn: "Filter"
      - waitForAnimationToEnd:
          timeout: 1500
# After confirming, the toolbar is scrolled to the extended tools (Filter icon is
# off-screen far left), so gate on any editor-toolbar indicator rather than the
# Filter icon specifically.
- extendedWaitUntil:
    visible:
      id: "filterEditingOptionsImageView"
    timeout: 15000
    optional: true
- extendedWaitUntil:
    visible:
      id: "editingOptionsImageView"
    timeout: 15000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)(Blur|Text|Paint|Filter|Adjust).*"
    timeout: 15000
