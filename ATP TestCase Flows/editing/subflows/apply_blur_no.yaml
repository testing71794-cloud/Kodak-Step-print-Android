appId: com.kodak.steptouch
---
# Blur NO path: open Blur tool and select NO BLUR (no radial effect).
- runFlow: open_blur_tool.yaml
- tapOn:
    text: "(?is).*no\\s+blur.*"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible:
        id: "saveRecentEditImageView"
    commands:
      - tapOn:
          id: "saveRecentEditImageView"
      - waitForAnimationToEnd:
          timeout: 1500
- extendedWaitUntil:
    visible:
      id: "editPhotoTextView"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "editingOptionsImageView"
    timeout: 10000
    optional: true
