appId: com.kodak.steptouch
---
# Pan + exit after Appium pinch (used by run_ed03_verify.bat).
- swipe:
    start: "50%, 42%"
    end: "68%, 42%"
    duration: 500
- swipe:
    start: "50%, 42%"
    end: "32%, 42%"
    duration: 500
- swipe:
    start: "50%, 42%"
    end: "50%, 55%"
    duration: 500
- swipe:
    start: "50%, 42%"
    end: "50%, 30%"
    duration: 500
- runFlow:
    when:
      visible:
        id: "saveRecentEditImageView"
    commands:
      - tapOn:
          id: "saveRecentEditImageView"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn: "Done"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible:
        id: "borderIV"
    commands:
      - tapOn:
          id: "linearLayoutBack"
      - waitForAnimationToEnd:
          timeout: 2000
