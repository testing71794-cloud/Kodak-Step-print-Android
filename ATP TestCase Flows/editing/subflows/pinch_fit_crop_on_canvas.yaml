appId: com.kodak.steptouch
---
# Two-finger pinch on fit/crop canvas.
# NOT real multitouch — Maestro has no native pinch (paired swipes only).
# For REAL pinch: automation\appium-gestures\scripts\run_ed03_verify.bat
- tapOn:
    id: "toBeEditedFilterImageViewTouch"
- waitForAnimationToEnd:
    timeout: 500
- swipe:
    start: "42%, 42%"
    end: "28%, 42%"
    duration: 300
- swipe:
    start: "58%, 42%"
    end: "72%, 42%"
    duration: 300
- waitForAnimationToEnd:
    timeout: 800
- swipe:
    start: "28%, 42%"
    end: "42%, 42%"
    duration: 300
- swipe:
    start: "72%, 42%"
    end: "58%, 42%"
    duration: 300
- waitForAnimationToEnd:
    timeout: 800
