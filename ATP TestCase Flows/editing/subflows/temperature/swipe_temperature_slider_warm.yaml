appId: com.kodak.steptouch
---
# Swipe temperature seekbar right toward warm/red (live preview).
- extendedWaitUntil:
    visible:
      id: "temperatureSeekbar"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 1000
# Seekbar track sits at ~85% height; drag from the centered thumb to the warm end.
- swipe:
    start: "50%,85%"
    end: "92%,85%"
    duration: 700
- waitForAnimationToEnd:
    timeout: 1500
