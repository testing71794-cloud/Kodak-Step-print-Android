appId: com.kodak.steptouch
---
# Swipe temperature seekbar left toward cool/blue.
- extendedWaitUntil:
    visible:
      id: "temperatureSeekbar"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 1000
- swipe:
    start: "85%,88%"
    end: "25%,88%"
- waitForAnimationToEnd:
    timeout: 1500
