appId: com.kodak.steptouch
---
# In-category sticker picker: horizontal thumbnails, X + checkmark header.
- extendedWaitUntil:
    visible:
      id: "imageViewStricker"
    timeout: 20000
    optional: true
- extendedWaitUntil:
    visible:
      id: "imageViewFilter"
    timeout: 10000
    optional: true
- assertVisible:
    text: "Stickers"