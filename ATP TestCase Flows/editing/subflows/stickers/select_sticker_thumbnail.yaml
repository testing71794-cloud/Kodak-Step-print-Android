appId: com.kodak.steptouch
---
- runFlow: handle_sticker_asset_download.yaml
- tapOn:
    id: "imageViewStricker"
    index: ${STICKER_THUMB_INDEX}
    optional: true
- tapOn:
    point: "20%,86%"
    optional: true
    label: First sticker thumbnail fallback
- waitForAnimationToEnd:
    timeout: 3000
