appId: com.kodak.steptouch
---
# After checkmark, return to main edit toolbar via Filter (never yellow Done).
- tapOn:
    text: "Filter"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      id: "filterEditingOptionsImageView"
    timeout: 15000
    optional: true
- extendedWaitUntil:
    visible:
      id: "editingOptionsImageView"
    timeout: 15000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)(Stickers|Filter|Frames).*"
    timeout: 15000
