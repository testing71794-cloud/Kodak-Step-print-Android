appId: com.kodak.steptouch
---
# Slider tools (Brightness, Temperature): swipe applies live on seekbar.
# Brightness panel: undoBrightnessImageView + brightnessSeekbar; confirm via checkmark when shown.
# Never tap yellow Done on slider panel — it exits edit. Fallback: tap Filter to return to toolbar.
- runFlow:
    when:
      visible:
        id: "saveRecentEditImageView"
    commands:
      - tapOn:
          id: "saveRecentEditImageView"
      - waitForAnimationToEnd:
          timeout: 1500
- runFlow:
    when:
      visible:
        id: "brightnessSeekbar"
    commands:
      - tapOn: "Filter"
      - waitForAnimationToEnd:
          timeout: 1500
- runFlow:
    when:
      visible:
        id: "temperatureSeekbar"
    commands:
      - tapOn: "Filter"
      - waitForAnimationToEnd:
          timeout: 1500
# Confirm + Filter can land on either the main edit toolbar (editPhotoTextView) or
# the filter carousel; the bottom toolbar row (filterEditingOptionsImageView) is
# present on both, so treat the title as optional and gate on the toolbar row.
- extendedWaitUntil:
    visible:
      id: "editPhotoTextView"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "filterEditingOptionsImageView"
    timeout: 10000
