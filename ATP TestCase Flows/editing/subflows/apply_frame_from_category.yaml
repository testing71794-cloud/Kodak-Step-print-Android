appId: com.kodak.steptouch
---
# Pick category → frame carousel → confirm. Caller must already be on Frames (category or carousel).
- tapOn:
    text: "Graduation"
    optional: true
- tapOn:
    id: "flFrameCategory"
    index: 2
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
      id: "imageViewFilter"
    timeout: 10000
    optional: true
- tapOn:
    id: "imageViewFilter"
    index: 3
    optional: true
- tapOn:
    id: "ivFrameCategory"
    index: 3
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible:
        id: "saveRecentEditImageView"
    commands:
      - tapOn:
          id: "saveRecentEditImageView"
      - waitForAnimationToEnd:
          timeout: 1500
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
      text: "Frames"
    timeout: 15000
    optional: true
- extendedWaitUntil:
    visible:
      id: "filterEditingOptionsImageView"
    timeout: 5000
    optional: true
- assertVisible:
    text: ".*(?i)(Frames|Filter|MY GALLERY).*"
