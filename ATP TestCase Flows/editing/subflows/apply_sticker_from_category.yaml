appId: com.kodak.steptouch
---
# Pick category → sticker carousel → confirm. Caller must already be on Stickers category screen.
- tapOn:
    text: "Graduation"
    optional: true
- tapOn:
    id: "flFrameCategory"
    index: 2
    optional: true
- tapOn:
    id: "tvFrameCategory"
    index: 2
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
      id: "imageViewStricker"
    timeout: 20000
- tapOn:
    id: "imageViewStricker"
    index: 3
    optional: true
- tapOn:
    id: "imageViewStricker"
    index: 1
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    point: "50%,50%"
    optional: true
    label: Place sticker on canvas if tap-to-place required
- runFlow:
    when:
      visible:
        id: "saveRecentEditImageView"
    commands:
      - tapOn:
          id: "saveRecentEditImageView"
      - waitForAnimationToEnd:
          timeout: 1500
- runFlow:
    when:
      visible:
        text: ".*(?i)select sticker category.*"
    commands:
      - tapOn:
          text: "Done"
      - waitForAnimationToEnd:
          timeout: 1500
- extendedWaitUntil:
    visible:
      id: "editPhotoTextView"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "editingOptionsImageView"
    timeout: 10000
    optional: true
- runFlow:
    when:
      notVisible:
        id: "editingOptionsImageView"
    commands:
      - assertVisible:
          id: "filterEditingOptionsImageView"
