appId: com.kodak.steptouch
---
# Photo detail preview — MicrosoftTeams-video (29).
# X top-left, share top-right, white frame, bottom: Edit | Pre-Cut Stickers | Collage | Print.
- tapOn:
    text: "All Photos"
    optional: true
- extendedWaitUntil:
    visible:
      id: "ivItemGridImage"
    timeout: 10000
- tapOn:
    id: "ivItemGridImage"
    index: 0
- doubleTapOn:
    id: "relativeLayoutItem"
    optional: true
- tapOn:
    id: "relativeLayoutItem"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "Edit"
    timeout: 15000
- assertVisible: "Edit"
- assertVisible: "Print"
- assertVisible: "Collage"
