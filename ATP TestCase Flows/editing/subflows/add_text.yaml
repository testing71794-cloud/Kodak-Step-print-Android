appId: com.kodak.steptouch
---
# Backward-compatible alias.
- runFlow: text/apply_text_overlay.yaml
- extendedWaitUntil:
    visible:
      id: "editingOptionsImageView"
    timeout: 10000
    optional: true
- runFlow:
    when:
      notVisible:
        id: "editingOptionsImageView"
    commands:
      - assertVisible:
          id: "filterEditingOptionsImageView"
