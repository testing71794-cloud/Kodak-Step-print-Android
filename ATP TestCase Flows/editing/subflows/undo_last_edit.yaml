appId: com.kodak.steptouch
---
- tapOn:
    text: ".*(?i)undo.*"
    optional: true
- tapOn:
    id: "imageViewUndo"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      text: "Frames"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "filterEditingOptionsImageView"
    timeout: 5000
    optional: true
