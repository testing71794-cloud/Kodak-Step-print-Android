appId: com.kodak.steptouch
---
# Type text on canvas, pick color, confirm placement (Done), then checkmark via return subflow.
- tapOn:
    point: "50%,45%"
    optional: true
    label: Focus text cursor on canvas
- tapOn:
    text: ".*(?i)abc.*"
    optional: true
    label: Open text keyboard via Abc
- inputText: "ATP"
- hideKeyboard:
    optional: true
- tapOn:
    point: "82%,88%"
    optional: true
    label: Red text color swatch
- tapOn:
    text: "Done"
    optional: true
- hideKeyboard:
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
