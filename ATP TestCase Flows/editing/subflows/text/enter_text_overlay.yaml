appId: com.kodak.steptouch
---
# Type text on canvas, pick color, confirm with Done + checkmark.
- tapOn:
    point: "50%,45%"
    optional: true
    label: Focus text cursor on canvas
- inputText: "ATP"
- tapOn:
    point: "82%,88%"
    optional: true
    label: Red text color swatch
- tapOn:
    text: "Done"
    optional: true
- hideKeyboard:
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- runFlow:
    when:
      visible:
        id: "saveRecentEditImageView"
    commands:
      - tapOn:
          id: "saveRecentEditImageView"
      - waitForAnimationToEnd:
          timeout: 1500
