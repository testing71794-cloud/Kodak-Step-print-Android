appId: com.kodak.steptouch
---
# Text overlay is already committed + confirmed in enter_text_overlay
# (Done -> top-right checkmark). Here we only verify we are back on the editor
# toolbar; we must NOT tap another confirm/Done (that would exit the editor).
- extendedWaitUntil:
    visible:
      id: "filterEditingOptionsImageView"
    timeout: 12000
    optional: true
- extendedWaitUntil:
    visible:
      id: "editingOptionsImageView"
    timeout: 12000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)(Text|Blur|Paint|Filter|Adjust).*"
    timeout: 15000
