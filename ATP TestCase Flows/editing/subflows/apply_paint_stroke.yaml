appId: com.kodak.steptouch
---
# Paint stroke on canvas (caller must already be on Paint panel).
# Panel: undo reset | color swatches | brush size bars.
- tapOn:
    point: "82%,88%"
    optional: true
    label: Red paint color swatch
- tapOn:
    point: "93%,88%"
    optional: true
    label: Thickest brush size
- swipe:
    start: "35%,45%"
    end: "75%,55%"
- swipe:
    start: "40%,50%"
    end: "70%,48%"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- runFlow:
    when:
      visible:
        id: "saveRecentEditImageView"
    commands:
      - tapOn:
          id: "saveRecentEditImageView"
      - waitForAnimationToEnd:
          timeout: 1500
- extendedWaitUntil:
    visible:
      id: "editingOptionsImageView"
    timeout: 10000
    optional: true
