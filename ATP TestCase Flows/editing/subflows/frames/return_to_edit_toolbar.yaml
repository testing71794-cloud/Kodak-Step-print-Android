appId: com.kodak.steptouch
---
# After frame apply: checkmark, then exit frames back to main edit toolbar.
# Never tap yellow Done on category screen — use Filter to return to toolbar.
- runFlow: confirm_frame_checkmark.yaml
- waitForAnimationToEnd:
    timeout: 3000
- runFlow:
    when:
      visible:
        text: ".*(?i)select frame category.*"
    commands:
      - tapOn: "Filter"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible:
        id: "imageViewFilter"
    commands:
      - tapOn: "Filter"
      - waitForAnimationToEnd:
          timeout: 2000
- extendedWaitUntil:
    visible:
      id: "filterEditingOptionsImageView"
    timeout: 15000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)(Frames|Filter).*"
    timeout: 15000
    optional: true
