appId: com.kodak.steptouch
---
# Apply radial blur then remove via NO BLUR control.
- runFlow:
    when:
      visible: "Blur"
    commands:
      - runFlow: blur/apply_blur_effect.yaml
      - runFlow: blur/open_blur_tool.yaml
      - runFlow: blur/tap_no_blur.yaml
      - runFlow: blur/confirm_blur_checkmark.yaml
- runFlow:
    when:
      notVisible: "Blur"
    commands:
      - assertVisible:
          id: "editPhotoTextView"
          optional: true
      - assertVisible:
          id: "filterEditingOptionsImageView"
          optional: true
