appId: com.kodak.steptouch
---
# Open Paint from extended edit toolbar.
- runFlow: ../scroll_edit_toolbar_right.yaml
- scrollUntilVisible:
    element: "Paint"
    direction: RIGHT
    timeout: 8000
    optional: true
- tapOn: "Paint"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      id: "undoPaintImageView"
    timeout: 15000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)paint.*"
    timeout: 15000
    optional: true
