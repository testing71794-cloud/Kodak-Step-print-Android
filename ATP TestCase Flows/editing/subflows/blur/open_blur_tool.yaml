appId: com.kodak.steptouch
---
# Open Blur from the extended edit toolbar (scroll right first).
# IMPORTANT: the Blur tool is a fully custom-rendered surface. Its controls
# ("NO BLUR" button, radial blur circle) are NOT exposed to the accessibility /
# view hierarchy (uiautomator returns a null root here), so we cannot assert or
# tap them by text/id — they must be driven by screen coordinates. Blur applies
# live to the preview as soon as the tool opens (radial selected by default).
- runFlow: ../scroll_edit_toolbar_right.yaml
- scrollUntilVisible:
    element: "Blur"
    direction: RIGHT
    timeout: 8000
    optional: true
- tapOn: "Blur"
- waitForAnimationToEnd:
    timeout: 2500
