appId: com.kodak.steptouch
---
# Radial blur control (yellow circle, right of the NO BLUR button). Drawn on a
# custom surface with no accessible id/text, so tap by coordinate. Radial is the
# default selection, so this is idempotent (verified: re-tapping keeps the blur).
- tapOn:
    point: "59%,87%"
    label: Radial blur control
- waitForAnimationToEnd:
    timeout: 2000
