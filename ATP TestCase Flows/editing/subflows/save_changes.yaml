appId: com.kodak.steptouch
---
# Exit edit and save — GA_11 sequence: Done → close → SAVE → gallery.
- runFlow:
    when:
      visible:
        id: "subEffectEditingOptionsRecyclerView"
    commands:
      - tapOn:
          id: "saveRecentEditImageView"
      - waitForAnimationToEnd:
          timeout: 1500
- tapOn: "Done"
- tapOn:
    id: "image_cross"
- tapOn: "SAVE"
- extendedWaitUntil:
    visible:
      text: ".*(?i)my gallery.*"
    timeout: 15000
