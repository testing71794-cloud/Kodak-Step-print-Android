appId: com.kodak.steptouch
---
# Tap vertical flip on Adjust submenu.
# No stable id for flip icons on this build; vertical flip sits center at ~50%,87%
# (between horizontal flip ~16% and rotate ~83%).
- tapOn:
    id: "adjustflipverticalImageView"
    optional: true
- tapOn:
    id: "adjustverticalImageView"
    optional: true
- runFlow:
    when:
      notVisible:
        id: "adjustflipverticalImageView"
    commands:
      - tapOn:
          point: "50%,87%"
          label: Vertical flip icon (center of adjust cluster)
- waitForAnimationToEnd:
    timeout: 1500
