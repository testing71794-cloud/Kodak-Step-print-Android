appId: com.kodak.steptouch
---
# Tap horizontal flip on Adjust submenu.
# This build exposes no stable id for flip icons (uiautomator can't dump the secure
# editor surface); rotate=adjustrotateImageView at ~83%,87%, so flip-h sits at ~16%,87%.
- tapOn:
    id: "adjustfliphorizontalImageView"
    optional: true
- tapOn:
    id: "adjusthorizontalImageView"
    optional: true
- runFlow:
    when:
      notVisible:
        id: "adjustfliphorizontalImageView"
    commands:
      - tapOn:
          point: "16%,87%"
          label: Horizontal flip icon (left of adjust cluster)
- waitForAnimationToEnd:
    timeout: 1500
