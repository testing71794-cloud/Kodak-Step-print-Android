# TC_ID: ED_12B - Blur text paint combined with AI verification
# P0 — Single editor session: apply blur, text, and paint sequentially with OpenRouter AI at each step.
appId: com.kodak.steptouch
name: ED_12B - Blur text paint combined with AI
---
- startRecording:
    path: ED_12B_extended_tools
    optional: true
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_12B_editor_ready
      SCREEN_LABEL: ED_12B Edit Photo before extended tools

# Blur
- takeScreenshot: ED_12B_blur_before
- runFlow: subflows/blur/apply_blur_effect.yaml
- takeScreenshot: ED_12B_blur_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_12B_blur_before
      AFTER_BASENAME: ED_12B_blur_after
      VERIFY_LABEL: ED_12B Combined blur step
      VERIFY_PROFILE: blur

# Text
- takeScreenshot: ED_12B_text_before
- runFlow: subflows/text/apply_text_overlay.yaml
- takeScreenshot: ED_12B_text_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_12B_text_before
      AFTER_BASENAME: ED_12B_text_after
      VERIFY_LABEL: ED_12B Combined text step
      VERIFY_PROFILE: text

# Paint
- takeScreenshot: ED_12B_paint_before
- runFlow: subflows/paint/apply_paint_doodle.yaml
- takeScreenshot: ED_12B_paint_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_12B_paint_before
      AFTER_BASENAME: ED_12B_paint_after
      VERIFY_LABEL: ED_12B Combined paint step
      VERIFY_PROFILE: draw

# Final editor state
- takeScreenshot: ED_12B_editor_final
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_12B_editor_final
      SCREEN_LABEL: ED_12B Editor after blur text paint
      SCREEN_PROFILE: edit_screen
- assertVisible:
    text: ".*(?i)(Paint|Filter).*"
- stopRecording
