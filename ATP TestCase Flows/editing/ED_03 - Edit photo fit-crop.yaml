# TC_ID: ED_03 - Edit photo fit/crop
# Reference: MicrosoftTeams-video (29) — pinch on photo detail preview (NOT Edit Photo canvas).
# Steps: gallery → open photo detail → two-finger pinch on preview → verify detail screen
# Maestro-only pinch: paired swipes in pinch_photo_detail_preview.yaml
# REAL two-finger pinch: scripts\run_ed03_real_pinch.bat [DEVICE]
appId: com.kodak.steptouch
name: ED_03 - Edit photo fit-crop
---  
- startRecording:
    path: ED_03_fit_crop
    optional: true
- launchApp:
    clearState: false
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/open_photo_detail_preview.yaml
- takeScreenshot: ED_03_detail_before_pinch
- runFlow: subflows/pinch_photo_detail_preview.yaml
- takeScreenshot: ED_03_detail_after_pinch
- runFlow: subflows/verify_photo_detail_fit_crop.yaml
- stopRecording
