# TC_ID: ED_10 - Draw comprehensive with AI verification
appId: com.kodak.steptouch
name: ED_10 - Draw comprehensive
---
- startRecording:
    path: ED_10_draw
    optional: true
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_10_editor_ready
      SCREEN_LABEL: Edit Photo before draw
- takeScreenshot: ED_10_draw_before
- runFlow: subflows/apply_doodle.yaml
- takeScreenshot: ED_10_draw_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_10_draw_before
      AFTER_BASENAME: ED_10_draw_after
      VERIFY_LABEL: Paint stroke
      VERIFY_PROFILE: draw
- runFlow: subflows/undo_last_edit.yaml
- takeScreenshot: ED_10_draw_2_before
- runFlow: subflows/apply_doodle.yaml
- takeScreenshot: ED_10_draw_2_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_10_draw_2_before
      AFTER_BASENAME: ED_10_draw_2_after
      VERIFY_LABEL: Second paint stroke
      VERIFY_PROFILE: draw
- assertVisible:
    id: "filterEditingOptionsImageView"
- stopRecording
