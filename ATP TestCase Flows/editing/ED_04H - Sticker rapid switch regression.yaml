# TC_ID: ED_04H - Sticker rapid switch regression
# P2 — Rapid thumbnail switching in Mother Day carousel
# Reference recording: Stickers.mp4
appId: com.kodak.steptouch
name: ED_04H - Sticker rapid switch regression
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_04H_editor_ready
      SCREEN_LABEL: ED_04H Edit Photo before stickers
- runFlow: subflows/stickers/open_stickers_tool.yaml
- runFlow:
    file: subflows/stickers/select_sticker_category.yaml
    env:
      STICKER_CATEGORY: "Mother Day"
      STICKER_CATEGORY_INDEX: 3
      STICKER_CATEGORY_POINT: "75%,72%"
- repeat:
    times: 4
    commands:
      - runFlow:
          file: subflows/stickers/select_sticker_thumbnail.yaml
          env:
            STICKER_THUMB_INDEX: 1
      - runFlow:
          file: subflows/stickers/select_sticker_thumbnail.yaml
          env:
            STICKER_THUMB_INDEX: 4
      - runFlow: subflows/stickers/place_sticker_on_canvas.yaml
- runFlow: subflows/stickers/confirm_sticker_checkmark.yaml
- runFlow: subflows/stickers/confirm_sticker_category_done.yaml
- assertVisible:
    id: "filterEditingOptionsImageView"
- assertVisible:
    text: "Stickers"
