# TC_ID: ED_02A - Filter all-in-one comprehensive with AI
# Single-session filter module: carousel UI + all 6 filters with before/after AI verify.
# Supersedes standalone ED_02 for CI (see ATP_FLOW_EXCLUDE).
appId: com.kodak.steptouch
name: ED_02A - Filter all-in-one comprehensive with AI
---
- startRecording:
    path: ED_02A_all_filters
    optional: true
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_02A_editor_ready
      SCREEN_LABEL: ED_02A Edit Photo before filters

# Filter carousel UI
- runFlow: subflows/open_filter_carousel.yaml
- takeScreenshot: ED_02A_filter_carousel
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_02A_filter_carousel
      SCREEN_LABEL: ED_02A Filter carousel open
      SCREEN_PROFILE: edit_screen
- back

# Filter 1
- runFlow: subflows/reset_to_no_filter.yaml
- takeScreenshot: ED_02A_filter_1_before
- runFlow:
    file: subflows/apply_filter_by_index.yaml
    env:
      FILTER_INDEX: 1
- takeScreenshot: ED_02A_filter_1_after
- runFlow:
    file: subflows/verify_filter_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_02A_filter_1_before
      AFTER_BASENAME: ED_02A_filter_1_after
      FILTER_LABEL: "ED_02A Filter 1"

