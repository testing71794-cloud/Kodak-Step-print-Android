# TC_ID: ED_Q6 - Brightness module quick check with AI
# Quick brightness check. Screenshots are taken on the slider panel (live preview)
# because leaving the slider via Filter does not persist for a toolbar-level compare.
appId: com.kodak.steptouch
name: ED_Q6 - Brightness module quick check with AI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_Q6_editor_ready
      SCREEN_LABEL: ED_Q6 Edit Photo before brightness

- runFlow: subflows/brightness/open_brightness_tool.yaml
- runFlow: subflows/brightness/assert_brightness_screen.yaml
- takeScreenshot: ED_Q6_brightness_before
- runFlow: subflows/brightness/swipe_brightness_slider_increase.yaml
- takeScreenshot: ED_Q6_brightness_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_Q6_brightness_before
      AFTER_BASENAME: ED_Q6_brightness_after
      VERIFY_LABEL: ED_Q6 Brightness increase
      VERIFY_PROFILE: brightness

- runFlow: subflows/brightness/return_to_edit_toolbar_from_brightness.yaml
- assertVisible:
    text: ".*(?i)(Brightness|Filter).*"
