# TC_ID: ED_11B - Blur screen navigation and UI
# P0 — Blur panel, AI screen verify, radial blur pair AI, return to toolbar
appId: com.kodak.steptouch
name: ED_11B - Blur screen navigation and UI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_11B_editor_ready
      SCREEN_LABEL: ED_11B Edit Photo before blur
- runFlow: subflows/blur/open_blur_tool.yaml
- runFlow: subflows/blur/assert_blur_screen.yaml
- takeScreenshot: ED_11B_blur_screen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_11B_blur_screen
      SCREEN_LABEL: ED_11B Blur panel screen
      SCREEN_PROFILE: blur_screen
- runFlow: subflows/blur/tap_radial_blur.yaml
- takeScreenshot: ED_11B_blur_after_radial
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_11B_blur_screen
      AFTER_BASENAME: ED_11B_blur_after_radial
      VERIFY_LABEL: ED_11B Radial blur on panel
      VERIFY_PROFILE: blur
- runFlow: subflows/blur/return_to_edit_toolbar_from_blur.yaml
- assertVisible:
    text: ".*(?i)(Blur|Filter).*"
