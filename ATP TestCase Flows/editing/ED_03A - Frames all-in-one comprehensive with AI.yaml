# TC_ID: ED_03A - Frames all-in-one comprehensive with AI
# P0 — Combines every frame operation (category nav, carousel, apply, replace,
#       remove, undo, cross-category, rapid switch, cancel, save persistence)
#       in a single editor session. AI compares screenshots after each operation.
# Reference recording: framesvideo.mp4
appId: com.kodak.steptouch
name: ED_03A - Frames all-in-one comprehensive with AI
---
- startRecording:
    path: ED_03A_frames_all
    optional: true
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_03A_editor_ready
      SCREEN_LABEL: ED_03A Edit Photo before frames

# 1) Category navigation screen (from ED_03B)
- runFlow: subflows/frames/open_frames_tool.yaml
- runFlow: subflows/frames/assert_frame_category_screen.yaml
- takeScreenshot: ED_03A_category_screen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_03A_category_screen
      SCREEN_LABEL: ED_03A Frame category screen
      SCREEN_PROFILE: frame_category

# 2) Carousel navigation screen (from ED_03B)
- runFlow: subflows/frames/scroll_frame_categories.yaml
- runFlow:
    file: subflows/frames/select_frame_category.yaml
    env:
      FRAME_CATEGORY: Graduation
      FRAME_CATEGORY_INDEX: 2
- runFlow: subflows/frames/assert_frame_carousel_screen.yaml
- runFlow: subflows/frames/scroll_frame_carousel.yaml
- takeScreenshot: ED_03A_carousel_screen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_03A_carousel_screen
      SCREEN_LABEL: ED_03A Frame carousel Graduation
      SCREEN_PROFILE: frame_carousel

# 3) Apply frame (from ED_03/ED_03C)
- takeScreenshot: ED_03A_apply_before
- runFlow:
    file: subflows/frames/select_frame_thumbnail.yaml
    env:
      FRAME_THUMB_INDEX: 3
- runFlow: subflows/frames/return_to_edit_toolbar.yaml
- takeScreenshot: ED_03A_apply_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03A_apply_before
      AFTER_BASENAME: ED_03A_apply_after
      VERIFY_LABEL: ED_03A Frame applied (Graduation)
      VERIFY_PROFILE: frame

# 4) Replace frame with a second category/thumbnail (from ED_03C)
- takeScreenshot: ED_03A_replace_before
- runFlow: subflows/frames/open_frames_tool.yaml
- runFlow:
    file: subflows/frames/apply_frame_full.yaml
    env:
      FRAME_CATEGORY: "Mother Day"
      FRAME_CATEGORY_INDEX: 1
      FRAME_THUMB_INDEX: 4
- takeScreenshot: ED_03A_replace_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03A_replace_before
      AFTER_BASENAME: ED_03A_replace_after
      VERIFY_LABEL: ED_03A Frame replaced (Mother Day)
      VERIFY_PROFILE: frame

# 5) Remove frame via no-frame slot (from ED_03C)
- takeScreenshot: ED_03A_remove_before
- runFlow: subflows/frames/open_frames_tool.yaml
- runFlow:
    file: subflows/frames/select_frame_category.yaml
    env:
      FRAME_CATEGORY: Graduation
      FRAME_CATEGORY_INDEX: 2
- runFlow: subflows/frames/select_no_frame.yaml
- runFlow: subflows/frames/return_to_edit_toolbar.yaml
- takeScreenshot: ED_03A_remove_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03A_remove_before
      AFTER_BASENAME: ED_03A_remove_after
      VERIFY_LABEL: ED_03A Frame removed
      VERIFY_PROFILE: frame_remove

# 6) Apply then Undo (from ED_03E) — skip AI verify if undo unavailable on build
- takeScreenshot: ED_03A_undo_frame_before
- runFlow: subflows/apply_frame.yaml
- takeScreenshot: ED_03A_undo_frame_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03A_undo_frame_before
      AFTER_BASENAME: ED_03A_undo_frame_after
      VERIFY_LABEL: ED_03A Frame applied before undo
      VERIFY_PROFILE: frame
- runFlow:
    when:
      visible:
        id: "imageViewUndo"
    commands:
      - runFlow: subflows/undo_last_edit.yaml
      - takeScreenshot: ED_03A_undo_after
      - runFlow:
          file: subflows/verify_visual_pair_with_ai.yaml
          env:
            BEFORE_BASENAME: ED_03A_undo_frame_after
            AFTER_BASENAME: ED_03A_undo_after
            VERIFY_LABEL: ED_03A Frame undone (reverted)
            VERIFY_PROFILE: frame_remove

# 7) Cross-category switch (from ED_03F) — apply from two categories in turn
- runFlow: subflows/frames/open_frames_tool.yaml
- runFlow: subflows/frames/scroll_frame_categories.yaml
- runFlow:
    file: subflows/frames/apply_frame_full.yaml
    env:
      FRAME_CATEGORY: "Fathers Day"
      FRAME_CATEGORY_INDEX: 3
      FRAME_THUMB_INDEX: 2
- runFlow: subflows/frames/open_frames_tool.yaml
- runFlow:
    file: subflows/frames/apply_frame_full.yaml
    env:
      FRAME_CATEGORY: Summer
      FRAME_CATEGORY_INDEX: 4
      FRAME_THUMB_INDEX: 3
- takeScreenshot: ED_03A_cross_category
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_03A_cross_category
      SCREEN_LABEL: ED_03A Cross-category frame on editor
      SCREEN_PROFILE: edit_screen

# 8) Rapid switch regression (from ED_03H)
- runFlow: subflows/frames/open_frames_tool.yaml
- runFlow:
    file: subflows/frames/select_frame_category.yaml
    env:
      FRAME_CATEGORY: Graduation
      FRAME_CATEGORY_INDEX: 2
- repeat:
    times: 3
    commands:
      - runFlow:
          file: subflows/frames/select_frame_thumbnail.yaml
          env:
            FRAME_THUMB_INDEX: 1
      - runFlow:
          file: subflows/frames/select_frame_thumbnail.yaml
          env:
            FRAME_THUMB_INDEX: 3
      - runFlow:
          file: subflows/frames/select_frame_thumbnail.yaml
          env:
            FRAME_THUMB_INDEX: 4
- runFlow: subflows/frames/return_to_edit_toolbar.yaml
- takeScreenshot: ED_03A_rapid_switch
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_03A_rapid_switch
      SCREEN_LABEL: ED_03A Editor stable after rapid switch
      SCREEN_PROFILE: edit_screen

# 9) Cancel/discard — preview must not persist (from ED_03D)
- takeScreenshot: ED_03A_cancel_before
- runFlow: subflows/frames/open_frames_tool.yaml
- runFlow:
    file: subflows/frames/select_frame_category.yaml
    env:
      FRAME_CATEGORY: Graduation
      FRAME_CATEGORY_INDEX: 2
- runFlow:
    file: subflows/frames/select_frame_thumbnail.yaml
    env:
      FRAME_THUMB_INDEX: 3
- runFlow: subflows/frames/cancel_frame_edit.yaml
- takeScreenshot: ED_03A_cancel_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03A_cancel_before
      AFTER_BASENAME: ED_03A_cancel_after
      VERIFY_LABEL: ED_03A Cancel frame — no visual change
      VERIFY_PROFILE: unchanged

# 10) Cross-tool + save persistence (from ED_03G)
- runFlow: subflows/apply_frame.yaml
- runFlow:
    file: subflows/apply_filter_by_index.yaml
    env:
      FILTER_INDEX: 2
- takeScreenshot: ED_03A_before_save
- runFlow: subflows/save_changes.yaml
- runFlow: subflows/open_gallery_photo_for_edit.yaml
- takeScreenshot: ED_03A_after_save_reopen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_03A_after_save_reopen
      SCREEN_LABEL: ED_03A Reopened edit with frame and filter
      SCREEN_PROFILE: edit_screen

- assertVisible:
    id: "filterEditingOptionsImageView"
- stopRecording
