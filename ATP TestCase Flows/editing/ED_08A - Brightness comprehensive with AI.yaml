# TC_ID: ED_08A - Brightness comprehensive with AI
# P0 — Before/after brightness swipe with OpenRouter pair verification
appId: com.kodak.steptouch
name: ED_08A - Brightness comprehensive with AI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_08A_editor_ready
      SCREEN_LABEL: ED_08A Edit Photo before brightness
- takeScreenshot: ED_08A_brightness_before
- runFlow: subflows/brightness/apply_brightness_adjustment.yaml
- takeScreenshot: ED_08A_brightness_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_08A_brightness_before
      AFTER_BASENAME: ED_08A_brightness_after
      VERIFY_LABEL: Brightness increase
      VERIFY_PROFILE: brightness
- assertVisible:
    text: ".*(?i)(Brightness|Filter).*"
