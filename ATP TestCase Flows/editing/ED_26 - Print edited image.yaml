# TC_ID: ED_26 - Print edited image
# ATP Expected: Edited image proceeds through print flow (printer required for full validation)
appId: com.kodak.steptouch
name: ED_26 - Print edited image
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- runFlow: subflows/apply_filter.yaml
- runFlow: subflows/save_changes.yaml
- runFlow: subflows/open_gallery_photo_for_edit.yaml
- runFlow: subflows/print_edited_image.yaml
