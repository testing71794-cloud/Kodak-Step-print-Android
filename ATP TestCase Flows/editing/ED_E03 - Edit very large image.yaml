# TC_ID: ED_E03 - Edit very large image
# ATP Expected: Large image loads and edit tools remain responsive
# Assumption: Uses first available gallery photo; dedicated large-image fixture not in repo
appId: com.kodak.steptouch
name: ED_E03 - Edit very large image
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- runFlow: subflows/adjust_brightness.yaml
- assertVisible:
    id: "filterEditingOptionsImageView"
