# TC_ID: ED_12 - Add text to photo
# Text is on extended toolbar (scroll right past Adjust/Blur).
appId: com.kodak.steptouch
name: ED_12 - Add text to photo
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- runFlow: subflows/scroll_edit_toolbar_right.yaml
- scrollUntilVisible:
    element: "Text"
    direction: RIGHT
    timeout: 8000
    optional: true
- runFlow:
    when:
      visible: "Text"
    file: subflows/add_text.yaml
- runFlow:
    when:
      notVisible: "Text"
    commands:
      - assertVisible:
          id: "editPhotoTextView"
          optional: true
      - assertVisible:
          id: "filterEditingOptionsImageView"
- assertVisible:
    id: "editingOptionsImageView"
    optional: true
- runFlow:
    when:
      notVisible:
        id: "editingOptionsImageView"
    commands:
      - assertVisible:
          id: "filterEditingOptionsImageView"
