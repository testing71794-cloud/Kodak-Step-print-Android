# TC_ID: ED_04F - Sticker cross category switch
# P1 — Person category then Mother Day sticker apply
# Reference recording: Stickers.mp4
appId: com.kodak.steptouch
name: ED_04F - Sticker cross category switch
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_04F_editor_ready
      SCREEN_LABEL: ED_04F Edit Photo before stickers
- runFlow: subflows/stickers/open_stickers_tool.yaml
- runFlow: subflows/stickers/scroll_sticker_categories.yaml
- runFlow:
    file: subflows/stickers/select_sticker_category.yaml
    env:
      STICKER_CATEGORY: Person
      STICKER_CATEGORY_INDEX: 0
      STICKER_CATEGORY_POINT: "20%,65%"
- runFlow:
    file: subflows/stickers/select_sticker_thumbnail.yaml
    env:
      STICKER_THUMB_INDEX: 1
- runFlow: subflows/stickers/confirm_sticker_checkmark.yaml
- back
- runFlow: subflows/stickers/open_stickers_tool.yaml
- runFlow:
    file: subflows/stickers/apply_sticker_full.yaml
    env:
      STICKER_CATEGORY: "Mother Day"
      STICKER_CATEGORY_INDEX: 3
      STICKER_CATEGORY_POINT: "75%,72%"
      STICKER_THUMB_INDEX: 4
- takeScreenshot: ED_04F_mother_day_sticker
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_04F_mother_day_sticker
      SCREEN_LABEL: ED_04F Mother Day sticker on editor
      SCREEN_PROFILE: edit_screen
- assertVisible:
    id: "filterEditingOptionsImageView"
