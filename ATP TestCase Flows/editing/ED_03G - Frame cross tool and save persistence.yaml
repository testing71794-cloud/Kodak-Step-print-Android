# TC_ID: ED_03G - Frame cross tool and save persistence
# P1 — Frame + filter combo, save, reopen photo, AI gallery verify
appId: com.kodak.steptouch
name: ED_03G - Frame cross tool and save persistence
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_03G_editor_ready
      SCREEN_LABEL: ED_03G Edit Photo before frames
- runFlow: subflows/apply_frame.yaml
- runFlow:
    file: subflows/apply_filter_by_index.yaml
    env:
      FILTER_INDEX: 2
- takeScreenshot: ED_03G_frame_filter_before_save
- runFlow: subflows/save_changes.yaml
- runFlow: subflows/open_gallery_photo_for_edit.yaml
- takeScreenshot: ED_03G_reopen_after_save
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_03G_reopen_after_save
      SCREEN_LABEL: ED_03G Reopened edit with frame and filter
      SCREEN_PROFILE: edit_screen
- assertVisible:
    id: "filterEditingOptionsImageView"
