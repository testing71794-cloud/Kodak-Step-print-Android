# TC_ID: ED_13 - Add doodle to photo (Paint tool on current build)
appId: com.kodak.steptouch
name: ED_13 - Add doodle to photo
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- runFlow: subflows/scroll_edit_toolbar_right.yaml
- scrollUntilVisible:
    element: "Paint"
    direction: RIGHT
    timeout: 8000
    optional: true
- runFlow:
    when:
      visible: "Paint"
    file: subflows/apply_doodle.yaml
- runFlow:
    when:
      notVisible: "Paint"
    file: subflows/apply_doodle_when_available.yaml
- assertVisible:
    id: "editingOptionsImageView"
    optional: true
- runFlow:
    when:
      notVisible:
        id: "editingOptionsImageView"
    commands:
      - assertVisible:
          id: "filterEditingOptionsImageView"
