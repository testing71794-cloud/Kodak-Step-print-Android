# TC_ID: ED_04E - Sticker undo
# P1 — Apply sticker, undo, AI verify reverted preview
# Reference recording: Stickers.mp4
appId: com.kodak.steptouch
name: ED_04E - Sticker undo
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_04E_editor_ready
      SCREEN_LABEL: ED_04E Edit Photo before stickers
- takeScreenshot: ED_04E_before_sticker
- runFlow: subflows/apply_sticker.yaml
- takeScreenshot: ED_04E_after_sticker
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_04E_before_sticker
      AFTER_BASENAME: ED_04E_after_sticker
      VERIFY_LABEL: ED_04E Sticker applied
      VERIFY_PROFILE: sticker
- runFlow: subflows/undo_last_edit.yaml
- takeScreenshot: ED_04E_after_undo
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_04E_after_sticker
      AFTER_BASENAME: ED_04E_after_undo
      VERIFY_LABEL: ED_04E Undo sticker
      VERIFY_PROFILE: generic
- assertVisible:
    id: "filterEditingOptionsImageView"
