# TC_ID: ED_24 - Cancel restores previous state
# ATP Expected: Canceling in-tool edit restores state before modification
appId: com.kodak.steptouch
name: ED_24 - Cancel restores previous state
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- tapOn: "Contrast"
- waitForAnimationToEnd:
    timeout: 2000
- swipe:
    start: "30%,90%"
    end: "80%,90%"
- runFlow: subflows/cancel_tool_edit.yaml
- assertVisible:
    id: "filterEditingOptionsImageView"
