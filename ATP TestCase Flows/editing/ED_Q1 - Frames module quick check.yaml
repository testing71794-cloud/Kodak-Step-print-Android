# TC_ID: ED_Q1 - Frames module quick check with AI
# Quick single-session frame check: apply, replace, remove. AI compares after each key op.
appId: com.kodak.steptouch
name: ED_Q1 - Frames module quick check with AI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_Q1_editor_ready
      SCREEN_LABEL: ED_Q1 Edit Photo before frames

# Apply
- takeScreenshot: ED_Q1_apply_before
- runFlow: subflows/apply_frame.yaml
- takeScreenshot: ED_Q1_apply_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_Q1_apply_before
      AFTER_BASENAME: ED_Q1_apply_after
      VERIFY_LABEL: ED_Q1 Frame applied
      VERIFY_PROFILE: frame

# Replace
- takeScreenshot: ED_Q1_replace_before
- runFlow: subflows/frames/open_frames_tool.yaml
- runFlow:
    file: subflows/frames/apply_frame_full.yaml
    env:
      FRAME_CATEGORY: "Mother Day"
      FRAME_CATEGORY_INDEX: 1
      FRAME_THUMB_INDEX: 4
- takeScreenshot: ED_Q1_replace_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_Q1_replace_before
      AFTER_BASENAME: ED_Q1_replace_after
      VERIFY_LABEL: ED_Q1 Frame replaced
      VERIFY_PROFILE: frame

# Remove
- takeScreenshot: ED_Q1_remove_before
- runFlow: subflows/frames/open_frames_tool.yaml
- runFlow:
    file: subflows/frames/select_frame_category.yaml
    env:
      FRAME_CATEGORY: Graduation
      FRAME_CATEGORY_INDEX: 2
- runFlow: subflows/frames/select_no_frame.yaml
- runFlow: subflows/frames/return_to_edit_toolbar.yaml
- takeScreenshot: ED_Q1_remove_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_Q1_remove_before
      AFTER_BASENAME: ED_Q1_remove_after
      VERIFY_LABEL: ED_Q1 Frame removed
      VERIFY_PROFILE: frame_remove

- assertVisible:
    id: "filterEditingOptionsImageView"
