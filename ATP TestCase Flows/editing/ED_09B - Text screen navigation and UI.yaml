# TC_ID: ED_09B - Text screen navigation and UI
# P0 — Text editor panel, AI screen verify, type text pair AI, return to toolbar
appId: com.kodak.steptouch
name: ED_09B - Text screen navigation and UI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_09B_editor_ready
      SCREEN_LABEL: ED_09B Edit Photo before text
- runFlow: subflows/text/open_text_tool.yaml
- runFlow: subflows/text/assert_text_screen.yaml
- takeScreenshot: ED_09B_text_screen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_09B_text_screen
      SCREEN_LABEL: ED_09B Text editor screen
      SCREEN_PROFILE: text_screen
- runFlow: subflows/text/enter_text_overlay.yaml
- takeScreenshot: ED_09B_text_after_entry
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_09B_text_screen
      AFTER_BASENAME: ED_09B_text_after_entry
      VERIFY_LABEL: ED_09B Text overlay on panel
      VERIFY_PROFILE: text
- runFlow: subflows/text/return_to_edit_toolbar_from_text.yaml
- assertVisible:
    text: ".*(?i)(Text|Filter).*"
