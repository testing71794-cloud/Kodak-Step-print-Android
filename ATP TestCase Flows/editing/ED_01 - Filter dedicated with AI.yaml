# TC_ID: ED_01 - Filter dedicated with AI verification
# Dedicated Filter-only editing test with OpenRouter pair verification.
appId: com.kodak.steptouch
name: ED_01 - Filter dedicated with AI
---
- startRecording:
    path: ED_01_filter_dedicated
    optional: true
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- assertVisible:
    id: "filterEditingOptionsImageView"

- takeScreenshot: ED_01_filter_before
- runFlow:
    file: subflows/apply_filter_by_index.yaml
    env:
      FILTER_INDEX: 2
- takeScreenshot: ED_01_filter_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_01_filter_before
      AFTER_BASENAME: ED_01_filter_after
      VERIFY_LABEL: ED_01 Dedicated filter
      VERIFY_PROFILE: filter

- assertVisible:
    id: "filterEditingOptionsImageView"
- runFlow: subflows/save_changes.yaml
- stopRecording
