# TC_ID: ED_13b - Apply paint stroke and verify
# Run after ED_13a in run_ed_visual_verify.bat (same session on Paint panel).
appId: com.kodak.steptouch
name: ED_13b - Doodle apply and verify
---
- runFlow:
    when:
      visible: "Paint"
    commands:
      - runFlow: subflows/apply_paint_stroke.yaml
      - takeScreenshot: ED_13_after_doodle
- runFlow:
    when:
      notVisible: "Paint"
    commands:
      - takeScreenshot: ED_13_after_doodle
      - assertVisible:
          id: "editPhotoTextView"
          optional: true
- assertVisible:
    id: "editingOptionsImageView"
    optional: true
