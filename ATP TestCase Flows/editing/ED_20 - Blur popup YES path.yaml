# TC_ID: ED_20 - Blur radial apply (YES path)
# Note: Skips when Blur not on toolbar (scroll right past Adjust).
appId: com.kodak.steptouch
name: ED_20 - Blur popup YES path
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- runFlow: subflows/scroll_edit_toolbar_right.yaml
- scrollUntilVisible:
    element: "Blur"
    direction: RIGHT
    timeout: 8000
    optional: true
- runFlow:
    when:
      visible: "Blur"
    file: subflows/apply_blur_yes.yaml
- runFlow:
    when:
      notVisible: "Blur"
    commands:
      - assertVisible:
          id: "editPhotoTextView"
- assertVisible:
    id: "editPhotoTextView"
    optional: true
- assertVisible:
    id: "editingOptionsImageView"
    optional: true
- runFlow:
    when:
      notVisible:
        id: "editingOptionsImageView"
    commands:
      - assertVisible:
          id: "filterEditingOptionsImageView"
