# TC_ID: ED_08B - Brightness screen navigation and UI
# P0 — Brightness slider panel, AI screen verify, swipe pair AI, reset, return to toolbar
appId: com.kodak.steptouch
name: ED_08B - Brightness screen navigation and UI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_08B_editor_ready
      SCREEN_LABEL: ED_08B Edit Photo before brightness
- runFlow: subflows/brightness/open_brightness_tool.yaml
- runFlow: subflows/brightness/assert_brightness_screen.yaml
- takeScreenshot: ED_08B_brightness_screen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_08B_brightness_screen
      SCREEN_LABEL: ED_08B Brightness slider screen
      SCREEN_PROFILE: brightness_screen
- runFlow: subflows/brightness/swipe_brightness_slider_increase.yaml
- takeScreenshot: ED_08B_brightness_after_swipe
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_08B_brightness_screen
      AFTER_BASENAME: ED_08B_brightness_after_swipe
      VERIFY_LABEL: ED_08B Brightness slider swipe
      VERIFY_PROFILE: brightness
- runFlow: subflows/brightness/reset_brightness_slider.yaml
- runFlow: subflows/brightness/return_to_edit_toolbar_from_brightness.yaml
- assertVisible:
    text: ".*(?i)(Brightness|Filter).*"
