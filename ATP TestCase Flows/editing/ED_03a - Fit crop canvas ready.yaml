# TC_ID: ED_03a - Photo detail ready for Appium pinch (video 29)
# Run before Appium W3C pinch in run_ed03_verify.bat — do not run alone for full ED_03.
appId: com.kodak.steptouch
name: ED_03a - Fit crop canvas ready
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/open_photo_detail_preview.yaml
- takeScreenshot: ED_03_detail_before_pinch
- tapOn:
    point: "50%, 42%"
    label: Focus photo preview before Appium pinch
