# TC_ID: ED_Q10 - Paint module quick check with AI
# Quick paint stroke. AI compares before/after.
appId: com.kodak.steptouch
name: ED_Q10 - Paint module quick check with AI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_Q10_editor_ready
      SCREEN_LABEL: ED_Q10 Edit Photo before paint

- takeScreenshot: ED_Q10_paint_before
- runFlow: subflows/paint/apply_paint_doodle.yaml
- takeScreenshot: ED_Q10_paint_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_Q10_paint_before
      AFTER_BASENAME: ED_Q10_paint_after
      VERIFY_LABEL: ED_Q10 Paint stroke
      VERIFY_PROFILE: draw

- assertVisible:
    text: ".*(?i)(Paint|Filter).*"
