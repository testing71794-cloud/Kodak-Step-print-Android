# TC_ID: ED_03 - Frames comprehensive with AI verification
# Applies decorative frames/borders and verifies each change visually.
appId: com.kodak.steptouch
name: ED_03 - Frames comprehensive
---
- startRecording:
    path: ED_03_frames
    optional: true
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_03_editor_ready
      SCREEN_LABEL: Edit Photo before frames
- takeScreenshot: ED_03_frame_1_before
- runFlow: subflows/apply_frame.yaml
- takeScreenshot: ED_03_frame_1_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03_frame_1_before
      AFTER_BASENAME: ED_03_frame_1_after
      VERIFY_LABEL: Frame application 1
      VERIFY_PROFILE: frame
- runFlow: subflows/undo_last_edit.yaml
- takeScreenshot: ED_03_frame_2_before
- runFlow: subflows/apply_frame.yaml
- takeScreenshot: ED_03_frame_2_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03_frame_2_before
      AFTER_BASENAME: ED_03_frame_2_after
      VERIFY_LABEL: Frame application 2
      VERIFY_PROFILE: frame
- assertVisible:
    id: "filterEditingOptionsImageView"
- stopRecording
