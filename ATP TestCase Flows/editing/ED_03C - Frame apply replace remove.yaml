# TC_ID: ED_03C - Frame apply replace remove
# P0 — Apply frame, AI verify, replace with second frame, remove via no-frame option
appId: com.kodak.steptouch
name: ED_03C - Frame apply replace remove
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_03C_editor_ready
      SCREEN_LABEL: ED_03C Edit Photo before frames
- takeScreenshot: ED_03C_apply_before
- runFlow: subflows/apply_frame.yaml
- takeScreenshot: ED_03C_apply_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03C_apply_before
      AFTER_BASENAME: ED_03C_apply_after
      VERIFY_LABEL: ED_03C Frame apply Graduation
      VERIFY_PROFILE: frame
- takeScreenshot: ED_03C_replace_before
- runFlow:
    file: subflows/frames/open_frames_tool.yaml
- runFlow:
    file: subflows/frames/apply_frame_full.yaml
    env:
      FRAME_CATEGORY: "Mother Day"
      FRAME_CATEGORY_INDEX: 1
      FRAME_THUMB_INDEX: 4
- takeScreenshot: ED_03C_replace_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03C_replace_before
      AFTER_BASENAME: ED_03C_replace_after
      VERIFY_LABEL: ED_03C Frame replace Mother Day
      VERIFY_PROFILE: frame
- takeScreenshot: ED_03C_remove_before
- runFlow:
    file: subflows/frames/open_frames_tool.yaml
- runFlow:
    file: subflows/frames/select_frame_category.yaml
    env:
      FRAME_CATEGORY: Graduation
      FRAME_CATEGORY_INDEX: 2
- runFlow: subflows/frames/select_no_frame.yaml
- runFlow: subflows/frames/confirm_frame_checkmark.yaml
- runFlow: subflows/frames/confirm_frame_category_done.yaml
- takeScreenshot: ED_03C_remove_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03C_remove_before
      AFTER_BASENAME: ED_03C_remove_after
      VERIFY_LABEL: ED_03C Frame removed
      VERIFY_PROFILE: frame
- assertVisible:
    id: "filterEditingOptionsImageView"
