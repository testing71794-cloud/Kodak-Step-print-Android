# TC_ID: ED_15 - Add frame to photo
appId: com.kodak.steptouch
name: ED_15 - Add frame to photo
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- runFlow: subflows/apply_frame.yaml
- assertVisible:
    id: "editingOptionsImageView"
