# TC_ID: ED_04a - Adjust menu ready (before rotate tap)
# Run first in run_ed04_verify.bat — leaves device on Adjust submenu with rotate icon visible.
appId: com.kodak.steptouch
name: ED_04a - Rotate canvas ready
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"   
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- tapOn: "Adjust"
- extendedWaitUntil:
    visible:
      id: "adjustrotateImageView"
    timeout: 8000
- assertVisible: "EDIT PHOTO"
- takeScreenshot: ED_04_before_rotate
