# TC_ID: ED_02 - Apply all filters with AI verification
# ATP Steps: Enter edit mode → for each filter capture before/after → apply filter → AI verify visible change
# ATP Expected: Every filter visibly changes the photo and keeps the user on the Edit Photo screen
appId: com.kodak.steptouch
name: ED_02 - Apply filter to photo
---
- startRecording:
    path: ED_02_all_filters
    optional: true
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_02_editor_ready
      SCREEN_LABEL: ED_02 Edit Photo before filters

# Filter 1
- runFlow: subflows/reset_to_no_filter.yaml
- takeScreenshot: ED_02_filter_1_before
- runFlow:
    file: subflows/apply_filter_by_index.yaml
    env:
      FILTER_INDEX: 1
- takeScreenshot: ED_02_filter_1_after
- runFlow:
    file: subflows/verify_filter_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_02_filter_1_before
      AFTER_BASENAME: ED_02_filter_1_after
      FILTER_LABEL: "Filter 1"

