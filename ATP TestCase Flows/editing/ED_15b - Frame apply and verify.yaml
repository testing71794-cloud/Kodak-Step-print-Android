# TC_ID: ED_15b - Select frame, confirm, assert toolbar
# Run after ED_15a in run_ed_visual_verify.bat (same session on Frames category screen).
appId: com.kodak.steptouch
name: ED_15b - Frame apply and verify
---
- extendedWaitUntil:
    visible:
      id: "flFrameCategory"
    timeout: 8000
- runFlow: subflows/apply_frame_from_category.yaml
- takeScreenshot: ED_15_after_frame
- assertVisible:
    id: "editingOptionsImageView"
    optional: true
- runFlow:
    when:
      notVisible:
        id: "editingOptionsImageView"
    commands:
      - assertVisible:
          id: "filterEditingOptionsImageView"
