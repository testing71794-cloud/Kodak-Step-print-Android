# TC_ID: ED_20a - Blur panel ready (before radial apply)
appId: com.kodak.steptouch
name: ED_20a - Blur canvas ready
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- runFlow:
    when:
      visible: "Blur"
    file: subflows/open_blur_tool.yaml
- takeScreenshot: ED_20_before_blur
- runFlow:
    when:
      notVisible: "Blur"
    commands:
      - assertVisible:
          id: "editPhotoTextView"
