# TC_ID: ED_08 - Adjust comprehensive with AI verification
# Exercises every adjust slider available in the edit toolbar.
appId: com.kodak.steptouch
name: ED_08 - Adjust comprehensive
---
- startRecording:
    path: ED_08_adjust
    optional: true
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_08_editor_ready
      SCREEN_LABEL: Edit Photo before adjust tools

- takeScreenshot: ED_08_brightness_before
- runFlow: subflows/adjust_brightness.yaml
- takeScreenshot: ED_08_brightness_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_08_brightness_before
      AFTER_BASENAME: ED_08_brightness_after
      VERIFY_LABEL: Brightness adjustment
      VERIFY_PROFILE: brightness

- takeScreenshot: ED_08_contrast_before
- runFlow: subflows/adjust_contrast.yaml
- takeScreenshot: ED_08_contrast_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_08_contrast_before
      AFTER_BASENAME: ED_08_contrast_after
      VERIFY_LABEL: Contrast adjustment
      VERIFY_PROFILE: adjust

- takeScreenshot: ED_08_warmth_before
- runFlow: subflows/adjust_warmth.yaml
- takeScreenshot: ED_08_warmth_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_08_warmth_before
      AFTER_BASENAME: ED_08_warmth_after
      VERIFY_LABEL: Warmth adjustment
      VERIFY_PROFILE: adjust

- takeScreenshot: ED_08_saturation_before
- runFlow: subflows/adjust_saturation.yaml
- takeScreenshot: ED_08_saturation_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_08_saturation_before
      AFTER_BASENAME: ED_08_saturation_after
      VERIFY_LABEL: Saturation adjustment
      VERIFY_PROFILE: adjust

- takeScreenshot: ED_08_highlights_before
- runFlow: subflows/adjust_highlights.yaml
- takeScreenshot: ED_08_highlights_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_08_highlights_before
      AFTER_BASENAME: ED_08_highlights_after
      VERIFY_LABEL: Highlights adjustment
      VERIFY_PROFILE: adjust

- takeScreenshot: ED_08_shadows_before
- runFlow: subflows/adjust_shadows.yaml
- takeScreenshot: ED_08_shadows_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_08_shadows_before
      AFTER_BASENAME: ED_08_shadows_after
      VERIFY_LABEL: Shadows adjustment
      VERIFY_PROFILE: adjust

- assertVisible:
    id: "filterEditingOptionsImageView"
- stopRecording
