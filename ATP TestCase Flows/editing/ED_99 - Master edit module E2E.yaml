# TC_ID: ED_99 - Master edit module end-to-end with AI validation
# Chains one representative action from each edit tool category then saves.
appId: com.kodak.steptouch
name: ED_99 - Master edit module E2E
---
- startRecording:
    path: ED_99_master_e2e
    optional: true
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_99_editor_ready
      SCREEN_LABEL: Master E2E editor entry

# Filters
- runFlow: subflows/reset_to_no_filter.yaml
- takeScreenshot: ED_99_filter_before
- runFlow:
    file: subflows/apply_filter_by_index.yaml
    env:
      FILTER_INDEX: 2
- takeScreenshot: ED_99_filter_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_99_filter_before
      AFTER_BASENAME: ED_99_filter_after
      VERIFY_LABEL: Master filter step
      VERIFY_PROFILE: filter

# Frames
- takeScreenshot: ED_99_frame_before
- runFlow: subflows/apply_frame.yaml
- takeScreenshot: ED_99_frame_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_99_frame_before
      AFTER_BASENAME: ED_99_frame_after
      VERIFY_LABEL: Master frame step
      VERIFY_PROFILE: frame

# Stickers
- takeScreenshot: ED_99_sticker_before
- runFlow: subflows/apply_sticker.yaml
- takeScreenshot: ED_99_sticker_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_99_sticker_before
      AFTER_BASENAME: ED_99_sticker_after
      VERIFY_LABEL: Master sticker step
      VERIFY_PROFILE: sticker

# Rotate
- takeScreenshot: ED_99_rotate_before
- runFlow: subflows/apply_rotate.yaml
- takeScreenshot: ED_99_rotate_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_99_rotate_before
      AFTER_BASENAME: ED_99_rotate_after
      VERIFY_LABEL: Master rotate step
      VERIFY_PROFILE: rotate

# Adjust brightness
- takeScreenshot: ED_99_adjust_before
- runFlow: subflows/adjust_brightness.yaml
- takeScreenshot: ED_99_adjust_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_99_adjust_before
      AFTER_BASENAME: ED_99_adjust_after
      VERIFY_LABEL: Master brightness step
      VERIFY_PROFILE: adjust

# Text
- takeScreenshot: ED_99_text_before
- runFlow: subflows/text/apply_text_overlay.yaml
- takeScreenshot: ED_99_text_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_99_text_before
      AFTER_BASENAME: ED_99_text_after
      VERIFY_LABEL: Master text step
      VERIFY_PROFILE: text

# Draw
- takeScreenshot: ED_99_draw_before
- runFlow: subflows/paint/apply_paint_doodle.yaml
- takeScreenshot: ED_99_draw_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_99_draw_before
      AFTER_BASENAME: ED_99_draw_after
      VERIFY_LABEL: Master draw step
      VERIFY_PROFILE: draw

# Blur
- takeScreenshot: ED_99_blur_before
- runFlow: subflows/blur/apply_blur_effect.yaml
- takeScreenshot: ED_99_blur_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_99_blur_before
      AFTER_BASENAME: ED_99_blur_after
      VERIFY_LABEL: Master blur step
      VERIFY_PROFILE: blur

# Save + gallery AI
- runFlow:
    file: subflows/save_and_verify_gallery_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_99_blur_after
      AFTER_BASENAME: ED_99_gallery_after_save
      VERIFY_LABEL: Master save to gallery
- takeScreenshot: ED_99_gallery_final
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_99_gallery_final
      SCREEN_LABEL: Master E2E gallery final
      SCREEN_PROFILE: gallery
- stopRecording
