# TC_ID: ED_08 - Adjust saturation
# Note: Skips when Saturation not on current build toolbar.
appId: com.kodak.steptouch
name: ED_08 - Adjust saturation
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- runFlow:
    when:
      visible: "Saturation"
    file: subflows/adjust_saturation.yaml
- runFlow:
    when:
      notVisible: "Saturation"
    commands:
      - assertVisible:
          id: "editingOptionsImageView"
- assertVisible:
    id: "editingOptionsImageView"
