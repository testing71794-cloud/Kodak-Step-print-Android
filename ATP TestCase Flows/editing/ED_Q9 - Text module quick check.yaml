# TC_ID: ED_Q9 - Text module quick check with AI
# Quick text overlay. AI compares before/after.
appId: com.kodak.steptouch
name: ED_Q9 - Text module quick check with AI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_Q9_editor_ready
      SCREEN_LABEL: ED_Q9 Edit Photo before text

- takeScreenshot: ED_Q9_text_before
- runFlow: subflows/text/apply_text_overlay.yaml
- takeScreenshot: ED_Q9_text_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_Q9_text_before
      AFTER_BASENAME: ED_Q9_text_after
      VERIFY_LABEL: ED_Q9 Text overlay
      VERIFY_PROFILE: text

- assertVisible:
    text: ".*(?i)(Text|Filter).*"
