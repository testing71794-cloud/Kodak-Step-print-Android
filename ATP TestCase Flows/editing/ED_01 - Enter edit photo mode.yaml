# TC_ID: ED_01 - Enter edit photo mode
# ATP Steps: 1. Launch → gallery → 2. Select photo → 3. Dismiss overlay → 4. Tap Edit → 5. Edit toolbar visible
# ATP Expected: User enters photo edit mode with editing tools available
appId: com.kodak.steptouch
name: ED_01 - Enter edit photo mode
---
# Step 1: Reach gallery after onboarding
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
# Steps 2–5: Open photo and validate edit mode
- runFlow: subflows/enter_edit_mode.yaml
- assertVisible:
    id: "filterEditingOptionsImageView"
