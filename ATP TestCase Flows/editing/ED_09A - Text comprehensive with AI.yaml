# TC_ID: ED_09A - Text comprehensive with AI
# P0 — Before/after text overlay with OpenRouter pair verification
appId: com.kodak.steptouch
name: ED_09A - Text comprehensive with AI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_09A_editor_ready
      SCREEN_LABEL: ED_09A Edit Photo before text
- takeScreenshot: ED_09A_text_before
- runFlow: subflows/text/apply_text_overlay.yaml
- takeScreenshot: ED_09A_text_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_09A_text_before
      AFTER_BASENAME: ED_09A_text_after
      VERIFY_LABEL: Text overlay ATP
      VERIFY_PROFILE: text
- assertVisible:
    text: ".*(?i)(Text|Filter).*"
