# TC_ID: ED_08F - Adjust tool screen navigation and UI
# P0 — Adjust flip/rotate panel, AI screen verify, rotate pair AI, return to toolbar
appId: com.kodak.steptouch
name: ED_08F - Adjust tool screen navigation and UI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_08F_editor_ready
      SCREEN_LABEL: ED_08F Edit Photo before adjust tools
- runFlow: subflows/adjust_tools/open_adjust_tool.yaml
- runFlow: subflows/adjust_tools/assert_adjust_tool_screen.yaml
- takeScreenshot: ED_08F_adjust_screen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_08F_adjust_screen
      SCREEN_LABEL: ED_08F Adjust flip rotate screen
      SCREEN_PROFILE: adjust_tool_screen
- runFlow: subflows/adjust_tools/tap_rotate_90.yaml
- takeScreenshot: ED_08F_adjust_after_rotate
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_08F_adjust_screen
      AFTER_BASENAME: ED_08F_adjust_after_rotate
      VERIFY_LABEL: ED_08F Adjust rotate on panel
      VERIFY_PROFILE: rotate
- runFlow: subflows/adjust_tools/return_to_edit_toolbar_from_adjust.yaml
- assertVisible:
    text: ".*(?i)(Adjust|Filter).*"
