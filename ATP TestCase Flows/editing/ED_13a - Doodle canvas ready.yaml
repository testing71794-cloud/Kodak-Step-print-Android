# TC_ID: ED_13a - Paint panel ready (before stroke)
appId: com.kodak.steptouch
name: ED_13a - Doodle canvas ready
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- scrollUntilVisible:
    element: "Paint"
    direction: RIGHT
    timeout: 8000
    optional: true
- runFlow:
    when:
      visible: "Paint"
    file: subflows/open_paint_tool.yaml
- takeScreenshot: ED_13_before_doodle
