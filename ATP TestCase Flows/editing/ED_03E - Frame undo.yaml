# TC_ID: ED_03E - Frame undo
# P1 — Apply frame, undo, AI verify reverted preview
appId: com.kodak.steptouch
name: ED_03E - Frame undo
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_03E_editor_ready
      SCREEN_LABEL: ED_03E Edit Photo before frames
- takeScreenshot: ED_03E_before_frame
- runFlow: subflows/apply_frame.yaml
- takeScreenshot: ED_03E_after_frame
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03E_before_frame
      AFTER_BASENAME: ED_03E_after_frame
      VERIFY_LABEL: ED_03E Frame applied
      VERIFY_PROFILE: frame
- runFlow: subflows/undo_last_edit.yaml
- takeScreenshot: ED_03E_after_undo
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_03E_after_frame
      AFTER_BASENAME: ED_03E_after_undo
      VERIFY_LABEL: ED_03E Undo frame
      VERIFY_PROFILE: generic
- assertVisible:
    id: "filterEditingOptionsImageView"
