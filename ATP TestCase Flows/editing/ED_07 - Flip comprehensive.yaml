# TC_ID: ED_07 - Flip comprehensive with AI verification
appId: com.kodak.steptouch
name: ED_07 - Flip comprehensive
---
- startRecording:
    path: ED_07_flip
    optional: true
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_07_editor_ready
      SCREEN_LABEL: Edit Photo before flip
- takeScreenshot: ED_07_flip_h_before
- runFlow: subflows/apply_flip_horizontal.yaml
- takeScreenshot: ED_07_flip_h_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_07_flip_h_before
      AFTER_BASENAME: ED_07_flip_h_after
      VERIFY_LABEL: Horizontal flip
      VERIFY_PROFILE: flip
- runFlow: subflows/undo_last_edit.yaml
- takeScreenshot: ED_07_flip_v_before
- runFlow: subflows/apply_flip_vertical.yaml
- takeScreenshot: ED_07_flip_v_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_07_flip_v_before
      AFTER_BASENAME: ED_07_flip_v_after
      VERIFY_LABEL: Vertical flip
      VERIFY_PROFILE: flip
- assertVisible:
    id: "editingOptionsImageView"
- stopRecording
