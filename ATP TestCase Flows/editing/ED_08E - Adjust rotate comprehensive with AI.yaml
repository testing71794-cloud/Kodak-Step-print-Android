# TC_ID: ED_08E - Adjust rotate comprehensive with AI
# P0 — Before/after rotate 90 with OpenRouter pair verification
appId: com.kodak.steptouch
name: ED_08E - Adjust rotate comprehensive with AI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_08E_editor_ready
      SCREEN_LABEL: ED_08E Edit Photo before adjust rotate
- takeScreenshot: ED_08E_rotate_before
- runFlow: subflows/adjust_tools/apply_rotate_adjustment.yaml
- takeScreenshot: ED_08E_rotate_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_08E_rotate_before
      AFTER_BASENAME: ED_08E_rotate_after
      VERIFY_LABEL: Adjust rotate 90 degrees
      VERIFY_PROFILE: rotate
- assertVisible:
    text: ".*(?i)(Adjust|Filter).*"
