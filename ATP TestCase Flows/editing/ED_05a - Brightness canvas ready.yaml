# TC_ID: ED_05a - Brightness slider ready (before swipe)
# Run first in run_ed05_verify.bat — leaves device on brightness slider.
appId: com.kodak.steptouch
name: ED_05a - Brightness canvas ready
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- assertVisible: "Brightness"
- tapOn: "Brightness"
- extendedWaitUntil:
    visible:
      id: "brightnessSeekbar"
    timeout: 8000
- takeScreenshot: ED_05_before_brightness
