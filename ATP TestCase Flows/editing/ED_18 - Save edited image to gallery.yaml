# TC_ID: ED_18 - Save edited image to gallery
# ATP Expected: Edited image saved; gallery shows updated photo
appId: com.kodak.steptouch
name: ED_18 - Save edited image to gallery
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- runFlow: subflows/apply_filter.yaml
- runFlow: subflows/save_changes.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
