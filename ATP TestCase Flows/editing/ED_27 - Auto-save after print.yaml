# TC_ID: ED_27 - Auto-save after print
# ATP Expected: Image automatically saved after printing when required by ATP
# Assumption: Requires connected printer; gallery return validated optionally
appId: com.kodak.steptouch
name: ED_27 - Auto-save after print
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- runFlow: subflows/apply_filter.yaml
- runFlow: subflows/print_auto_saves_image.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
    optional: true
