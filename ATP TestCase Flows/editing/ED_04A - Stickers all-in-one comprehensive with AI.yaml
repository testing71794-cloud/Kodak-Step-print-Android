# TC_ID: ED_04A - Stickers all-in-one comprehensive with AI
# Single-session stickers module: category UI, apply, replace, cancel, undo,
# cross-category, rapid switch, and frame+sticker save persistence.
# Supersedes ED_04 / ED_04B–ED_04H for CI (see ATP_FLOW_EXCLUDE).
appId: com.kodak.steptouch
name: ED_04A - Stickers all-in-one comprehensive with AI
---
- startRecording:
    path: ED_04A_stickers_all
    optional: true
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_04A_editor_ready
      SCREEN_LABEL: ED_04A Edit Photo before stickers

# 1) Category navigation (ED_04B)
- runFlow: subflows/stickers/open_stickers_tool.yaml
- runFlow: subflows/stickers/assert_sticker_category_screen.yaml
- takeScreenshot: ED_04A_category_screen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_04A_category_screen
      SCREEN_LABEL: ED_04A Sticker category screen
      SCREEN_PROFILE: sticker_category
- runFlow: subflows/stickers/scroll_sticker_categories.yaml

# 2) Carousel UI (Summer category)
- runFlow:
    file: subflows/stickers/select_sticker_category.yaml
    env:
      STICKER_CATEGORY: Summer
      STICKER_CATEGORY_INDEX: 2
      STICKER_CATEGORY_POINT: "50%,72%"
- runFlow: subflows/stickers/assert_sticker_carousel_screen.yaml
- runFlow: subflows/stickers/scroll_sticker_carousel.yaml
- takeScreenshot: ED_04A_carousel_screen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_04A_carousel_screen
      SCREEN_LABEL: ED_04A Sticker carousel Summer
      SCREEN_PROFILE: sticker_category

# 3) Apply Summer sticker (distinct from base photo for AI)
- takeScreenshot: ED_04A_apply_before
- runFlow:
    file: subflows/stickers/select_sticker_thumbnail.yaml
    env:
      STICKER_THUMB_INDEX: 0
- runFlow: subflows/stickers/place_sticker_on_canvas.yaml
- runFlow: subflows/stickers/confirm_sticker_checkmark.yaml
- runFlow: subflows/stickers/return_to_edit_toolbar_from_stickers.yaml
- takeScreenshot: ED_04A_apply_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_04A_apply_before
      AFTER_BASENAME: ED_04A_apply_after
      VERIFY_LABEL: ED_04A Summer sticker applied
      VERIFY_PROFILE: sticker

# 4) Replace with Words sticker (ED_04C)
- takeScreenshot: ED_04A_replace_before
- runFlow: subflows/stickers/open_stickers_tool.yaml
- runFlow:
    file: subflows/stickers/apply_sticker_full.yaml
    env:
      STICKER_CATEGORY: Words
      STICKER_CATEGORY_INDEX: 2
      STICKER_CATEGORY_POINT: "55%,72%"
      STICKER_THUMB_INDEX: 2
- takeScreenshot: ED_04A_replace_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_04A_replace_before
      AFTER_BASENAME: ED_04A_replace_after
      VERIFY_LABEL: ED_04A Replace with Words sticker
      VERIFY_PROFILE: sticker

# 5) Cancel discard (ED_04D)
- takeScreenshot: ED_04A_cancel_before
- runFlow: subflows/stickers/open_stickers_tool.yaml
- runFlow:
    file: subflows/stickers/select_sticker_category.yaml
    env:
      STICKER_CATEGORY: Summer
      STICKER_CATEGORY_INDEX: 2
      STICKER_CATEGORY_POINT: "50%,72%"
- runFlow:
    file: subflows/stickers/select_sticker_thumbnail.yaml
    env:
      STICKER_THUMB_INDEX: 1
- runFlow: subflows/stickers/cancel_sticker_edit.yaml
- takeScreenshot: ED_04A_cancel_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_04A_cancel_before
      AFTER_BASENAME: ED_04A_cancel_after
      VERIFY_LABEL: ED_04A Cancel sticker — no visual change
      VERIFY_PROFILE: unchanged

# 6) Apply then undo (ED_04E)
- takeScreenshot: ED_04A_undo_before
- runFlow: subflows/apply_sticker.yaml
- takeScreenshot: ED_04A_undo_after_apply
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_04A_undo_before
      AFTER_BASENAME: ED_04A_undo_after_apply
      VERIFY_LABEL: ED_04A Sticker before undo
      VERIFY_PROFILE: sticker
- runFlow:
    when:
      visible:
        id: "imageViewUndo"
    commands:
      - runFlow: subflows/undo_last_edit.yaml
      - takeScreenshot: ED_04A_undo_after
      - runFlow:
          file: subflows/verify_visual_pair_with_ai.yaml
          env:
            BEFORE_BASENAME: ED_04A_undo_after_apply
            AFTER_BASENAME: ED_04A_undo_after
            VERIFY_LABEL: ED_04A Sticker undone
            VERIFY_PROFILE: unchanged

# 7) Cross-category switch (ED_04F)
- runFlow: subflows/stickers/open_stickers_tool.yaml
- runFlow: subflows/stickers/scroll_sticker_categories.yaml
- runFlow:
    file: subflows/stickers/apply_sticker_full.yaml
    env:
      STICKER_CATEGORY: Person
      STICKER_CATEGORY_INDEX: 0
      STICKER_CATEGORY_POINT: "20%,65%"
      STICKER_THUMB_INDEX: 1
- runFlow: subflows/stickers/open_stickers_tool.yaml
- runFlow:
    file: subflows/stickers/apply_sticker_full.yaml
    env:
      STICKER_CATEGORY: Summer
      STICKER_CATEGORY_INDEX: 2
      STICKER_CATEGORY_POINT: "50%,72%"
      STICKER_THUMB_INDEX: 0
- takeScreenshot: ED_04A_cross_category
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_04A_cross_category
      SCREEN_LABEL: ED_04A Cross-category sticker on editor
      SCREEN_PROFILE: edit_screen

# 8) Rapid switch regression (ED_04H)
- runFlow: subflows/stickers/open_stickers_tool.yaml
- runFlow:
    file: subflows/stickers/select_sticker_category.yaml
    env:
      STICKER_CATEGORY: Summer
      STICKER_CATEGORY_INDEX: 2
      STICKER_CATEGORY_POINT: "50%,72%"
- repeat:
    times: 2
    commands:
      - runFlow:
          file: subflows/stickers/select_sticker_thumbnail.yaml
          env:
            STICKER_THUMB_INDEX: 0
      - runFlow:
          file: subflows/stickers/select_sticker_thumbnail.yaml
          env:
            STICKER_THUMB_INDEX: 1
      - runFlow: subflows/stickers/place_sticker_on_canvas.yaml
- runFlow: subflows/stickers/confirm_sticker_checkmark.yaml
- runFlow: subflows/stickers/return_to_edit_toolbar_from_stickers.yaml
- takeScreenshot: ED_04A_rapid_switch
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_04A_rapid_switch
      SCREEN_LABEL: ED_04A Editor stable after rapid sticker switch
      SCREEN_PROFILE: edit_screen

# 9) Frame + sticker save persistence (ED_04G)
- runFlow: subflows/apply_frame.yaml
- runFlow: subflows/apply_sticker.yaml
- takeScreenshot: ED_04A_before_save
- runFlow: subflows/save_changes.yaml
- runFlow: subflows/open_gallery_photo_for_edit.yaml
- takeScreenshot: ED_04A_after_save_reopen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: ED_04A_after_save_reopen
      SCREEN_LABEL: ED_04A Reopened with frame and sticker
      SCREEN_PROFILE: edit_screen

- assertVisible:
    id: "filterEditingOptionsImageView"
- stopRecording
