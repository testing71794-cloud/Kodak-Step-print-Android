# TC_ID: ED_Q5 - Flip module quick check with AI
# Quick flip check. Vertical flip is AI-verified (mirror is visible on this photo);
# horizontal flip is applied as a functional check (test photo is left-right symmetric,
# so a correct horizontal mirror is not visually detectable by AI).
appId: com.kodak.steptouch
name: ED_Q5 - Flip module quick check with AI
---
- runFlow:
    file: subflows/prepare_editor_warm_start.yaml
    env:
      SCREENSHOT_BASENAME: ED_Q5_editor_ready
      SCREEN_LABEL: ED_Q5 Edit Photo before flip

# Vertical flip — AI-verified (top/bottom mirror is visible)
- takeScreenshot: ED_Q5_flip_v_before
- runFlow: subflows/apply_flip_vertical.yaml
- takeScreenshot: ED_Q5_flip_v_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: ED_Q5_flip_v_before
      AFTER_BASENAME: ED_Q5_flip_v_after
      VERIFY_LABEL: ED_Q5 Vertical flip
      VERIFY_PROFILE: flip

# Horizontal flip — functional check (returns to toolbar with edit applied)
- runFlow: subflows/apply_flip_horizontal.yaml
- assertVisible:
    id: "editingOptionsImageView"

- assertVisible:
    id: "editingOptionsImageView"
