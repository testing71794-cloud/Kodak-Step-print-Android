# TC_ID: ED_23 - Undo last edit modification
# ATP Expected: Undo resets the most recent modification
appId: com.kodak.steptouch
name: ED_23 - Undo last edit modification
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
- runFlow: subflows/enter_edit_mode.yaml
- runFlow: subflows/adjust_brightness.yaml
- runFlow: subflows/undo_last_edit.yaml
- assertVisible:
    id: "filterEditingOptionsImageView"
