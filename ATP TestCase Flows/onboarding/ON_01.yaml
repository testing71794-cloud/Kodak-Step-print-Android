# TC_ID: ON_01
# ATP Name: Onboarding screen
# ATP Steps: 1. Open app → 2. I'll do it later → 3. Agree to terms
# ATP Expected: User should be able to access the onboarding screen after accepting the terms and conditions
appId: com.kodak.steptouch
name: "ON_01 - Enter onboarding after accepting terms"
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_onboarding_after_terms.yaml
- extendedWaitUntil:
    visible: "Skip"
    timeout: 15000
- extendedWaitUntil:
    visible: "Next"
    timeout: 15000
- runFlow:
    when:
      visible: "Gallery"
    commands:
      - assertVisible: "Gallery"
- runFlow:
    when:
      visible: "You also can swipe to take a photo"
    commands:
      - assertVisible: "You also can swipe to take a photo"
- runFlow:
    when:
      visible: "Switch Between\nCamera and Gallery"
    commands:
      - assertVisible: "Switch Between\nCamera and Gallery"
