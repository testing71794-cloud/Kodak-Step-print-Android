appId: com.kodak.steptouch
---
# Dismiss common Android runtime permission dialogs when they appear (may repeat).
- tapOn:
    text: "While using the app"
    optional: true
    label: Permission – While using the app
- tapOn:
    text: "Allow only while using the app"
    optional: true
- tapOn:
    text: "Only this time"
    optional: true
    label: Permission – Only this time
- tapOn:
    text: "Allow"
    optional: true
    label: Permission – Allow
- tapOn:
    text: "ALLOW"
    optional: true
    label: Permission – ALLOW

- runFlow:
    when:
      visible: "Enable photos access"
    commands:
      - tapOn: "Enable photos access"
      - waitForAnimationToEnd:
          timeout: 2000
      - tapOn:
          text: "Allow"
          optional: true

- runFlow:
    when:
      visible: "Enable camera access"
    commands:
      - tapOn: "Enable camera access"
      - waitForAnimationToEnd:
          timeout: 2000
      - tapOn:
          text: "Allow"
          optional: true

- runFlow:
    when:
      visible: "Photos Access Required"
    commands:
      - tapOn:
          text: "Ok"
          optional: true
      - tapOn:
          text: "OK"
          optional: true
