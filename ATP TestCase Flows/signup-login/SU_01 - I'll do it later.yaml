# TC_ID: SU_01 - I'll do it later
appId: com.kodak.steptouch
name: SU_01 - I'll do it later
---
# ATP SU_01 – Skip sign up, then agree to terms (expects onboarding afterward).
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- assertVisible: "Full Name*"
- assertVisible: "Email*"
- assertVisible: "Password*"
- assertVisible: "SIGN UP"
- assertVisible: "Already have an account?"
- assertVisible: "I'll do it later"
- tapOn: "I'll do it later"
- runFlow: subflows/accept_terms_if_visible.yaml
- assertVisible: "Start a quick tour"
