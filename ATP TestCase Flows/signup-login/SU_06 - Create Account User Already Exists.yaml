# TC_ID: SU_06 - Create Account User Already Exists
appId: com.kodak.steptouch
name: SU_06 - Create Account User Already Exists
---
# ATP SU_06 – Existing email shows alert with OK and Forgot.
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- tapOn: "Full Name*"
- inputText: Nitesh Mehra
- tapOn: "Email*"
- inputText: Niteshmehra56@gmail.com
- tapOn: "Password*"
- inputText: 252546Nm#
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "SIGN UP"
- extendedWaitUntil:
    visible: "User already exists"
    timeout: 2000
- assertVisible:
    text: "OK"
    optional: true
- assertVisible:
    text: "Ok"
    optional: true
- assertVisible:
    text: "Forgot password?"
    optional: true

