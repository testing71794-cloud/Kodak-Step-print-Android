# TC_ID: COL_05
# Sheet: edit collage > flip (after MG_15)
# Steps: flip → different photo → flip → done
appId: com.kodak.steptouch
name: COL_05 - Edit collage flip
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/create_collage_editor_ready.yaml
- runFlow: subflows/dismiss_print_overlay_if_visible.yaml
- runFlow: subflows/tap_collage_edit_tile_first.yaml
- tapOn: "Flip"
- runFlow: subflows/tap_collage_edit_tile_second.yaml
- tapOn: "Flip"
- tapOn:
    id: "button_save"
