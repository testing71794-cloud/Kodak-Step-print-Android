# TC_ID: COL_07
# Sheet: edit collage > rotate (after MG_15)
# Steps: tap tile → rotate
appId: com.kodak.steptouch
name: COL_07 - Edit collage rotate
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/create_collage_editor_ready.yaml
- runFlow: subflows/dismiss_print_overlay_if_visible.yaml
- runFlow: subflows/tap_collage_edit_tile_first.yaml
- tapOn: "Rotate"
- tapOn:
    id: "button_save"
