# TC_ID: COL_06
# Sheet: edit collage > replace (after MG_15)
# Steps: replace → select photo → next → done
appId: com.kodak.steptouch
name: COL_06 - Edit collage replace
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/create_collage_editor_ready.yaml
- runFlow: subflows/tap_collage_edit_tile_first.yaml
- tapOn: "Replace"
- tapOn:
    id: "relativeLayoutItem"
    below: "Select Photos"
    index: 2
    optional: true
- tapOn:
    id: "image"
    index: 2
    optional: true
- tapOn:
    text: "Next"
    optional: true
- tapOn:
    id: "button_save"
