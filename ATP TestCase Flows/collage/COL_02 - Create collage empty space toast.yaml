# TC_ID: COL_02
# Sheet: create collage (matching photos and layout)
# Steps: select → 2-4 photos → collage → highlighted layout → next → create collage → save
appId: com.kodak.steptouch
name: COL_02 - Create collage matching photos and layout
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/create_collage_two_photos.yaml
