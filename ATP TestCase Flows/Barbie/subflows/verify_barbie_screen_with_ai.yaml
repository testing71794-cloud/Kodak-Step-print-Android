appId: com.kodak.steptouch
---
# Single-screen OpenRouter verification (Barbie theme, intro, splash, category screens).
- runScript:
    file: ../scripts/verify_barbie_screen_openrouter.js
    env:
      SCREEN_BASENAME: ${SCREEN_BASENAME}
      SCREEN_LABEL: ${SCREEN_LABEL}
      SCREEN_PROFILE: ${SCREEN_PROFILE}
- assertTrue: ${output.barbie_screen_verified}
