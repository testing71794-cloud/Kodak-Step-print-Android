appId: com.kodak.steptouch
---
# Step 3–4: Tap available Barbie printer and confirm pairing.
# Env: BT_BARBIE_DEVICE_NAME (discoverable Barbie Step printer name).
- runFlow:
    when:
      visible:
        text: ${BT_BARBIE_DEVICE_NAME}
    commands:
      - tapOn:
          text: ${BT_BARBIE_DEVICE_NAME}
- runFlow:
    when:
      notVisible:
        text: ${BT_BARBIE_DEVICE_NAME}
    commands:
      - tapOn:
          point: "39%,20%"
          label: Barbie printer list entry fallback
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: ../../connection/subflows/pairing_optional.yaml
- waitForAnimationToEnd:
    timeout: 2000
