appId: com.kodak.steptouch
---
# Step 4: Confirm pairing — required when the system dialog appears.
- runFlow:
    when:
      visible: "Bluetooth pairing request"
    commands:
      - assertVisible: "Pair"
      - tapOn: "Pair"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible:
        text: ".*Pair with Kodak.*"
    commands:
      - tapOn: "Pair"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow: ../../connection/subflows/pairing_optional.yaml
