appId: com.kodak.steptouch
---
# Step 3: Tap the Barbie printer in the list (name when env set, else coordinate fallback).
# Env: BT_BARBIE_DEVICE_NAME and/or BT_DEVICE_NAME must match the list label exactly.
- runFlow:
    when:
      visible:
        text: ".*Barbie.*"
    commands:
      - tapOn:
          text: ".*Barbie.*"

- runFlow: pick_barbie_printer.yaml
