appId: com.kodak.steptouch
---
# BA_06 steps 4–6: Connect to a non-Barbie Kodak Step printer.
# Env: BT_STANDARD_DEVICE_NAME
- runFlow: open_bluetooth_from_gallery.yaml
- runFlow:
    when:
      visible:
        text: ${BT_STANDARD_DEVICE_NAME}
    commands:
      - tapOn:
          text: ${BT_STANDARD_DEVICE_NAME}
- runFlow:
    when:
      notVisible:
        text: ${BT_STANDARD_DEVICE_NAME}
    commands:
      - tapOn:
          point: "39%,20%"
          label: Standard printer list entry fallback
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: ../../connection/subflows/pairing_optional.yaml
- waitForAnimationToEnd:
    timeout: 2000
