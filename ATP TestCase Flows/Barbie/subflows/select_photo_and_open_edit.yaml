appId: com.kodak.steptouch
---
# Steps 2–4: Select photo → dismiss overlay → tap Edit.
- tapOn:
    id: "imageViewPhoto"
    index: 1
    optional: true
- tapOn:
    point: "50%,45%"
    label: Gallery photo fallback
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: dismiss_overlay_if_visible.yaml
- tapOn:
    id: "linearlayout_edit_photo"
    optional: true
- tapOn:
    text: "Edit"
    optional: true
- extendedWaitUntil:
    visible:
      id: "filterEditingOptionsImageView"
    timeout: 2000
