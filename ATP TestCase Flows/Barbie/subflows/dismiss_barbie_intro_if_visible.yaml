appId: com.kodak.steptouch
---
# Dismiss first-time Barbie intro after connection (not used in BA_02).
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Get started"
    optional: true
- tapOn:
    text: "Let's go"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "Ok"
    optional: true
- tapOn:
    point: "50%,85%"
    label: Intro dismiss fallback
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
