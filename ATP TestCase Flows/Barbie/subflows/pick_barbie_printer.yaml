appId: com.kodak.steptouch
---
# Pick Barbie printer from device list (name first, then gallery/print coordinates).
- runFlow:
    when:
      visible:
        text: ${BT_BARBIE_DEVICE_NAME}
    commands:
      - tapOn:
          text: ${BT_BARBIE_DEVICE_NAME}

- runFlow:
    when:
      visible:
        text: ${BT_DEVICE_NAME}
    commands:
      - tapOn:
          text: ${BT_DEVICE_NAME}

- runFlow:
    when:
      notVisible:
        id: "linearLayoutConnection"
    commands:
      - tapOn:
          point: "39%,20%"
          label: Gallery Bluetooth device list (CO_01)
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      notVisible:
        id: "linearLayoutConnection"
    commands:
      - tapOn:
          point: "21%,13%"
          label: Print wizard device list (CO_03 / PR_01)
      - waitForAnimationToEnd:
          timeout: 2000
