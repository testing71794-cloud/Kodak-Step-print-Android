appId: com.kodak.steptouch
---
# Barbie theme is enabled once a Barbie Step printer is connected.
# Requires connected printer icon — gallery alone is not enough.
- assertVisible:
    id: "linearLayoutConnection"
- assertNotVisible:
    text: "Printer Not Connected"
- runFlow: ../../connection/subflows/assert_printer_icon_connected.yaml
- extendedWaitUntil:
    visible: ".*(?i)my gallery.*"
    timeout: 2000
