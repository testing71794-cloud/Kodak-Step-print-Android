appId: com.kodak.steptouch
---
# BA_06 step 2: Disconnect the connected Barbie printer.
- tapOn:
    id: "imageViewConnection"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: "Disconnect"
    optional: true
- tapOn:
    text: "DISCONNECT"
    optional: true
- tapOn:
    text: "Forget"
    optional: true
- tapOn:
    text: "Forget device"
    optional: true
- tapOn:
    id: "linearLayoutBack"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
