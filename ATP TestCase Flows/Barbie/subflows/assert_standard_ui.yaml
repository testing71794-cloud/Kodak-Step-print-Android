appId: com.kodak.steptouch
---
# Revert to standard UI after connecting a non-Barbie Kodak Step device.
- runFlow: ../../connection/subflows/assert_printer_icon_connected.yaml
- extendedWaitUntil:
    visible: ".*(?i)my gallery.*"
    timeout: 2000
- assertNotVisible:
    text: ".*Barbie x Kodak.*"
    optional: true
