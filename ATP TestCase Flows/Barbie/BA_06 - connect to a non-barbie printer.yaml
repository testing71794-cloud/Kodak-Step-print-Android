# TC_ID: BA_06 - connect to a non-barbie printer
# ATP Description: Revert the Barbie UI
# ATP Steps: 1. Complete BA_01 → 2. Disconnect Barbie printer → 3. Connect non-Barbie printer → 4. Tap Bluetooth (top-right) → 5. Tap non-Barbie printer → 6. Confirm pairing
# ATP Expected: User reverts to standard UI by connecting a non-Barbie Kodak Step device
# Env: BT_BARBIE_DEVICE_NAME, BT_STANDARD_DEVICE_NAME
appId: com.kodak.steptouch
name: BA_06 - connect to a non-barbie printer
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_barbie.yaml
- runFlow: subflows/connect_barbie_printer.yaml
- runFlow: subflows/assert_barbie_theme_enabled.yaml
- runFlow: subflows/dismiss_barbie_intro_if_visible.yaml
- runFlow: subflows/disconnect_barbie_printer.yaml
- runFlow: subflows/pair_standard_device.yaml
- runFlow: subflows/assert_standard_ui.yaml
