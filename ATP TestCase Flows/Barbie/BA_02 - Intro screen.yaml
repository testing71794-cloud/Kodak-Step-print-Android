# TC_ID: BA_02 - Intro screen
# ATP Description: First time connection screen
# ATP Steps: 1. Repeat BA_01
# ATP Expected: After connection, user sees Barbie x Kodak Step Slim printer banner
# Note: Barbie theme is enabled once a Barbie Step printer is connected.
# Env: BT_BARBIE_DEVICE_NAME
appId: com.kodak.steptouch
name: BA_02 - Intro screen
---
- launchApp:
    clearState: false
- runFlow: subflows/ensure_barbie_printer_ready.yaml
- runFlow: subflows/reach_gallery_for_barbie.yaml
- tapOn:
    point: "15%,26%"
- runFlow: subflows/assert_barbie_intro_banner.yaml
- takeScreenshot: BA_02_barbie_intro
- runFlow:
    file: subflows/verify_barbie_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: BA_02_barbie_intro
      SCREEN_LABEL: BA_02 Barbie intro banner
      SCREEN_PROFILE: barbie_intro
