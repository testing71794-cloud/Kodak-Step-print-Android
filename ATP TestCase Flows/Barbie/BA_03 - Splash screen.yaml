
# TC_ID: BA_03 - Splash screen
# ATP Description: Barbie splash screen
# ATP Steps: 1. Repeat BA_01 → 2. Close Step Prints app → 3. Re-open Step Prints app
# ATP Expected: Barbie splash screen when opening app after Barbie printer connection
# Note: Barbie theme is enabled once a Barbie Step printer is connected.
# Env: BT_BARBIE_DEVICE_NAME
appId: com.kodak.steptouch
name: BA_03 - Splash screen
---
- launchApp:
    clearState: false
- runFlow: subflows/assert_barbie_splash_screen.yaml
- takeScreenshot: BA_03_barbie_splash
- runFlow:
    file: subflows/verify_barbie_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: BA_03_barbie_splash
      SCREEN_LABEL: BA_03 Barbie splash screen
      SCREEN_PROFILE: barbie_splash
- extendedWaitUntil:
    visible: ".*(?i)my gallery.*"
    timeout: 5000
