# TC_ID: BA_01 - Connect Barbie printer
# ATP Description: Enable Barbie UI
# ATP Steps: 1. Open app → 2. Tap Bluetooth (top-right) → 3. Tap Barbie printer → 4. Confirm pairing
# ATP Expected: User connects Barbie Step printer; app transitions to Barbie UI after connection
# Note: Barbie theme is enabled once a Barbie Step printer is connected.
# Env: BT_DEVICE_NAME="Exact name in Bluetooth list" (required for step 3)
# Example: maestro --device SERIAL test "ATP TestCase Flows/Barbie/BA_01 - Connect Barbie printer.yaml" -e BT_DEVICE_NAME="Kodak Step Touch Barbie"
appId: com.kodak.steptouch
name: BA_01 - Connect Barbie printer
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible: "My gallery"
- runFlow: subflows/connect_barbie_printer.yaml
- runFlow: subflows/assert_barbie_theme_enabled.yaml
