# TC_ID: SE_06 - Share settings > Facebook
# ATP Steps: 1. Open app → 2. settings (gear) → 3. Share settings → 4. Facebook toggle → 5. continue and log in
# ATP Expected: User should be able to link their Facebook account through share settings
appId: com.kodak.steptouch
name: SE_06 - Share settings > Facebook
---
- runFlow: subflows/open_app_to_gallery.yaml
- runFlow: subflows/open_settings_from_gallery.yaml
# Step 3: tap "Share settings".
- tapOn:
    text: "Share settings"
    optional: true
- tapOn:
    text: "Share Settings"
    optional: true
# Step 4–5: Facebook toggle → continue / log in.
- tapOn:
    id: "toggleBtnFacebook"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"

- runFlow:
    when:
      visible: "Edit access"
    commands:
      - tapOn:
          text: "Continue as.*"
- runFlow:
    when:
      visible: "Continue as"
    commands:
      - tapOn:
          text: "Continue as.*"
          optional: true
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "I already have a profile"
    commands:
      - tapOn: "I already have a profile"
- runFlow:
    when:
      visible:
        text: ".*(?i)(email or phone|mobile number or email|log in to facebook).*"
    commands:
      - tapOn:
          text: "Email"
          optional: true
      - tapOn:
          text: "Mobile number or email"
          optional: true
      - tapOn:
          text: "Email or phone"
          optional: true
      - inputText: "cplusadev@gmail.com"
      - tapOn:
          text: "Password"
          optional: true
      - inputText: "CAglobal@127"
      - tapOn:
          text: "Log in"
          optional: true
      - tapOn:
          text: "Log In"
          optional: true
      - waitForAnimationToEnd:
          timeout: 2000
- assertVisible: "Facebook"

- assertVisible: "SHARE SETTINGS"
