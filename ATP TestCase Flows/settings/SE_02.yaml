# TC_ID: SE_02
# ATP Name: Quick Tips
# ATP Steps: 1. Open app → 2. tap settings (gear) top-left → 3. tap "Quick tips"
# ATP Expected: User should be able to open the quick tips page
appId: com.kodak.steptouch
name: SE_02 - Quick Tips
---
- runFlow: subflows/open_app_to_gallery.yaml
- runFlow: subflows/open_settings_from_gallery.yaml
# Step 3: tap on the "Quick tips" button.
- tapOn:
    text: "Quick tips"
    optional: true
- tapOn:
    text: "Quick Tips"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)(app quick tour|quick tips).*"
    timeout: 2000
