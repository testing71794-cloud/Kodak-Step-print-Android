# TC_ID: SE_04 - Support
# ATP Steps: 1. Open app → 2. settings (gear) top-left → 3. tap "Support"
# ATP Expected: Redirect to native mail app; email addressed to kodak@caglobal.com
appId: com.kodak.steptouch
name: SE_04 - Support
---
- runFlow: subflows/open_app_to_gallery.yaml
- runFlow: subflows/open_settings_from_gallery.yaml
# Step 3: tap on the "Support" button.
- tapOn: "Support"
- runFlow:
    when:
      visible: "Gmail"
    commands:
      - tapOn: "Gmail"
- extendedWaitUntil:
    visible:
      text: ".*kodak@caglobal\\.com.*"
    timeout: 2000
