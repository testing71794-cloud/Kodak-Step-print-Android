# TC_ID: SE_05
# ATP Name: Share settings
# ATP Steps: 1. Open app → 2. settings (gear) top-left → 3. tap "Share settings"
# ATP Expected: User enters share settings; available social media accounts are visible
appId: com.kodak.steptouch
name: SE_05 - Share settings
---
- runFlow: subflows/open_app_to_gallery.yaml
- runFlow: subflows/open_settings_from_gallery.yaml
# Step 3: tap on the "Share settings" button.
- tapOn:
    text: "Share settings"
    optional: true
- tapOn:
    text: "Share Settings"
    optional: true
- extendedWaitUntil:
    visible: "ACCESS YOUR SOCIAL MEDIA PHOTOS"
    timeout: 2000
- assertVisible: "SHARE SETTINGS"
- assertVisible: "Facebook"
