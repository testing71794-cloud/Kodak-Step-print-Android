appId: com.kodak.steptouch
---
# After LOGIN: terms/onboarding overlay, then ON_03 skip path to gallery.
- extendedWaitUntil:
    visible:
      text: ".*(?i)(my gallery|all photos|agree terms and conditions|start a quick tour|skip).*"
    timeout: 60000
- runFlow:
    when:
      visible: "Agree Terms and Conditions"
    commands:
      - tapOn: "Agree Terms and Conditions"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow: reach_gallery_after_signup_overlay.yaml
