# TC_ID: SE_10 - About
# ATP Steps: 1. Open app → 2. settings (gear) top-left → 3. tap "about"
# ATP Expected: User should see the about us information
appId: com.kodak.steptouch
name: SE_10 - About
---
- launchApp
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- runFlow: subflows/open_settings_from_gallery.yaml
# Step 3: tap "about".
- tapOn:
    text: "About"
    optional: true
- tapOn:
    text: "about"
    optional: true
- tapOn:
    text: "About Us"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)(about us|about).*"
    timeout: 2000
