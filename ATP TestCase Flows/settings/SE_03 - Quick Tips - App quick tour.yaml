# TC_ID: SE_03 - Quick Tips > App quick tour
# ATP Steps: 1. Open app → 2. settings (gear) → 3. Quick tips → 4. App quick tour → 5. slide left and right
# ATP Expected: User can open quick tour/onboarding slides and navigate through them
appId: com.kodak.steptouch
name: SE_03 - Quick Tips > App quick tour
---
- runFlow: subflows/open_app_to_gallery.yaml
- runFlow: subflows/open_settings_from_gallery.yaml
# Step 3: tap "Quick tips".
- tapOn:
    text: "Quick tips"
    optional: true
- tapOn:
    text: "Quick Tips"
    optional: true
# Step 4: tap "App quick tour".
- extendedWaitUntil:
    visible: "App quick tour"
    timeout: 2000
- tapOn: "App quick tour"
- runFlow:
    when:
      visible: "Start a quick tour"
    commands:
      - tapOn: "Start a quick tour"
# Step 5: slide left and right through the slides.
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200

- assertVisible: "Tap to \nAdjust Your \nGallery View"
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200

- assertVisible: "Check Printer\nConnectivity \nStatus"
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200
- assertVisible: "Take New  Photo"
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200
- assertVisible: "Create Collage From Selected Photos"
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200
- assertVisible: "Before You Edit or Print"
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200
- assertVisible: "Tap this icon to see editing \noptions"
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200
- assertVisible: "For use with special Kodak Pre-Cut Sticker Paper, tap this icon to start"
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200
- assertVisible: "Tap this icon to start creating a collage"
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200
- assertVisible: "Customize Your Pre-Cut Stickers"
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200
- assertVisible: "Customize Your Collage"
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200
- assertVisible: "Set number of copies \nor adjust color"
- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 200
- assertVisible: "Thank You!"
- tapOn: "Finish App Tour"
- extendedWaitUntil:
    visible:
      text: ".*(?i)(quick tips|support|share settings|order paper refill|legal|about).*"
    timeout: 2000

