# TC_ID: SE_09
# ATP Name: Legal
# ATP Steps: 1. Open app → 2. settings (gear) top-left → 3. tap "legal"
# ATP Expected: User should see Kodak Step Print app privacy policy
appId: com.kodak.steptouch
name: SE_09 - Legal
---
- runFlow: subflows/open_app_to_gallery.yaml
- runFlow: subflows/open_settings_from_gallery.yaml
# Step 3: tap "legal".
- tapOn:
    text: "Legal"
    optional: true
- tapOn:
    text: "legal"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)(privacy policy|privacy).*"
    timeout: 2000
