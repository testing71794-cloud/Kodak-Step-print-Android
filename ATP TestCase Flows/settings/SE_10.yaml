# TC_ID: SE_10
# ATP Name: About
# ATP Steps: 1. Open app → 2. settings (gear) top-left → 3. tap "about"
# ATP Expected: User should see the about us information
appId: com.kodak.steptouch
name: SE_10 - About
---
- runFlow: subflows/open_app_to_gallery.yaml
- runFlow: subflows/open_settings_from_gallery.yaml
# Step 3: tap "about".
- tapOn:
    text: "About"
    optional: true
- tapOn:
    text: "about"
    optional: true
- tapOn:
    text: "About Us"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)(about us|about).*"
    timeout: 2000
