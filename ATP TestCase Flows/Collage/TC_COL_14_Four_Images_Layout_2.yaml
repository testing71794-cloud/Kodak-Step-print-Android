appId: com.kodaksmile
name: TC_COL_14_Four_Images_Layout_2
---
# Complete journey: cold launch -> home -> All Photos -> select 4 photo(s) -> Collage -> layout 2 -> Adjust Layout -> Save.
# Assumes footer on Select Layout reads "N Items selected" for N>1; adjust if the app differs.
- launchApp:
    clearState: true
- runFlow: ../../elements/loadElements.yaml
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/swipeOnboardingIfShown.yaml
- runFlow: ../../flows/onboardingSkip.yaml
- runFlow:
    when:
      visible: "Go to homepage"
    commands:
      - tapOn: "Go to homepage"
      - waitForAnimationToEnd
- runFlow: ../../flows/waitForHomeScreen.yaml
- runFlow: ../../flows/grantPhotosAccess.yaml
- tapOn: "All Photos"
- waitForAnimationToEnd
- assertVisible: "All Photos"
- assertVisible: "Select"
- runFlow:
    when:
      visible: "Select"
    commands:
      - tapOn: "Select"
      - waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Select Items"
    commands:
      - tapOn:
          id: textViewSelect
      - waitForAnimationToEnd
- assertVisible: "Select Items"
- assertVisible: "Collage"
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 0
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 1
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 2
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 3
- waitForAnimationToEnd
- tapOn: "Collage"
- waitForAnimationToEnd
- assertVisible: "Select Layout"
- assertVisible: "4 Items selected"
# Collage layout slot 2 (resource id layoutTwoVImage2).
- tapOn:
    id: "layoutTwoVImage2"
- waitForAnimationToEnd
- assertVisible: "Select Layout"
- assertVisible: "Next"
- assertVisible: "4 Items selected"
- tapOn: "Next"
- waitForAnimationToEnd
- assertVisible: "Adjust Layout"
- assertVisible: "Replace Image"
- assertVisible: "Save"
- waitForAnimationToEnd
- tapOn: "Save"
- runFlow:
    when:
      visible: "Save Photo?"
    commands:
      - tapOn: "Save"
      - waitForAnimationToEnd
- assertVisible: "KODAK SMILE"
- assertVisible: "All Photos"
