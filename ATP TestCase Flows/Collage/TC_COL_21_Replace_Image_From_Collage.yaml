appId: com.kodaksmile
name: TC_COL_21_Replace_Image_From_Collage
---
# Complete journey: Adjust Layout -> Replace Image -> dismiss -> still Adjust Layout.
- launchApp:
    clearState: true
- runFlow: ../../elements/loadElements.yaml
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/swipeOnboardingIfShown.yaml
- runFlow: ../../flows/onboardingSkip.yaml
- runFlow:
    when:
      visible: "Go to homepage"
    commands:
      - tapOn: "Go to homepage"
      - waitForAnimationToEnd
- runFlow: ../../flows/waitForHomeScreen.yaml
- runFlow: ../../flows/grantPhotosAccess.yaml
- tapOn: "All Photos"
- waitForAnimationToEnd
- assertVisible: "All Photos"
- assertVisible: "Select"
- runFlow:
    when:
      visible: "Select"
    commands:
      - tapOn: "Select"
      - waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Select Items"
    commands:
      - tapOn:
          id: textViewSelect
      - waitForAnimationToEnd
- assertVisible: "Select Items"
- assertVisible: "Collage"
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 0
- waitForAnimationToEnd
- tapOn: "Collage"
- waitForAnimationToEnd
- assertVisible: "Select Layout"
- assertVisible: "1 Item selected"
# Collage layout slot 1 (resource id layoutTwoHImage2).
- tapOn:
    id: "layoutTwoHImage2"
- waitForAnimationToEnd
- assertVisible: "Next"
- tapOn: "Next"
- waitForAnimationToEnd
- assertVisible: "Adjust Layout"
- assertVisible: "Replace Image"
- assertVisible: "Save"
- tapOn: "Replace Image"
- runFlow:
    when:
      visible: "Cancel"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "CANCEL"
    commands:
      - tapOn: "CANCEL"
      - waitForAnimationToEnd
- assertVisible: "Adjust Layout"
