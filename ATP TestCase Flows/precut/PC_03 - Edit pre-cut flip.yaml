# TC_ID: PC_03 - Edit pre-cut flip
appId: com.kodak.steptouch
name: PC_03 - Edit pre-cut flip
---
- launchApp
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- runFlow: subflows/create_precut_editor_ready.yaml
- runFlow: subflows/tap_precut_tile.yaml
- tapOn: "Flip"
- tapOn:
    id: "button_save"
- assertVisible: "Edit"
