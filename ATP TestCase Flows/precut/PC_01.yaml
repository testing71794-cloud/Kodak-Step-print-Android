appId: com.kodak.steptouch
name: PC_01 - Create pre-cut
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible: "MY GALLERY"
- runFlow: subflows/reach_gallery_for_precut.yaml
- runFlow: subflows/create_precut_one_photo.yaml
- extendedWaitUntil:
    visible:
      text: "Done"
    timeout: 2000
    optional: true
