appId: com.kodak.steptouch
---
# Same as create_precut_one_photo but stops on the editor (no save Done).
- runFlow: enter_precut_from_up_next.yaml
- runFlow: dismiss_print_overlay_if_visible.yaml
- tapOn:
    id: "preCutLL"
- tapOn:
    text: "Remember to load your printer with Kodak 2x3 Pre-Cut Sticker Paper before using this feature!"
    optional: true
- assertVisible: "Photo Plus"
- tapOn: "KODAK 2”x3” Zink Pre-Cut Sticker Photo Paper (30 Pack)"
- swipe:
    start: "90%, 50%"
    end: "10%, 50%"
- back
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "Ok"
    optional: true
- tapOn:
    id: "image"
    index: 2
- tapOn: "Next"
- extendedWaitUntil:
    visible:
      id: "button_save"
    timeout: 2000
