# TC_ID: PM_25 - Rapid Permission Actions
# ATP Steps: 1. Rapidly tap Allow/Deny on camera popup
# ATP Expected: No crash or duplicate actions
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_25 - Rapid Permission Actions
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_camera_permission_prompt.yaml
- runFlow:
    when:
      visible: ".*(?i)take pictures and record video.*"
    commands:
      - repeat:
          times: 3
          commands:
            - tapOn:
                text: "While using the app"
                optional: true
            - tapOn:
                text: "Don't allow"
                optional: true
- runFlow: subflows/resume_permission_flow_after_interrupt.yaml
- runFlow: subflows/allow_camera_permission.yaml
- runFlow: subflows/advance_remaining_permissions_to_gallery.yaml
