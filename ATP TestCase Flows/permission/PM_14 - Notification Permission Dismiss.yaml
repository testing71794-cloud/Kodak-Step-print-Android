# TC_ID: PM_14 - Notification Permission Dismiss
# ATP Steps: 1. Notification popup → 2. Dismiss if applicable
# ATP Expected: Application handles dismissal; flow continues
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_14 - Notification Permission Dismiss
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_notification_permission_prompt.yaml
- runFlow:
    when:
      visible: ".*(?i)send you notifications.*"
    commands:
      - runFlow: subflows/dismiss_permission_popup.yaml
- runFlow: subflows/finish_permission_flow_to_gallery.yaml
