# TC_ID: PM_17 - Photos and Videos Permission Limited Access
# ATP Steps: 1. Photos popup → 2. Allow limited access → 3. Select 3 labelled photos → 4. Done
# ATP Expected: Exactly 3 selected photos (10 Jun 2026 4:32/3:58/3:52 pm) visible in MY GALLERY
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_17 - Photos and Videos Permission Limited Access
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_photos_permission_prompt.yaml
- runFlow: subflows/allow_photos_limited_permission.yaml
