# TC_ID: PM_05 - Location Permission Precise Location
# ATP Steps: 1. Allow Camera → 2. Location popup → 3. Precise + While using
# ATP Expected: Precise location granted; Nearby Devices dialog next
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_05 - Location Permission Precise Location
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_location_permission_prompt.yaml
- runFlow: subflows/allow_location_precise_permission.yaml
- extendedWaitUntil:
    visible: ".*(?i)(nearby devices|relative position of nearby|send you notifications|access (more )?photos and videos|photos and videos on this device|my gallery).*"
    timeout: 45000
