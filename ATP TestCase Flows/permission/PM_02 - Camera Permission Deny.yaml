# TC_ID: PM_02 - Camera Permission Deny
# ATP Steps: 1. Camera permission popup appears → 2. Tap Don't Allow
# ATP Expected: Flow continues to next permission; Permission Required NOT shown on first deny
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_02 - Camera Permission Deny
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_camera_permission_prompt.yaml
- runFlow: subflows/deny_camera_permission.yaml
- runFlow: subflows/wait_for_permission_after_camera.yaml
- runFlow:
    when:
      visible: ".*(?i)permission required.*"
    commands:
      - assertVisible: "Permission Required"
      - assertVisible: ".*(?i)some permissions are needed.*"

