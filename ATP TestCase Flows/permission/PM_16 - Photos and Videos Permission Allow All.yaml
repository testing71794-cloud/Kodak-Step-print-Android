# TC_ID: PM_16 - Photos and Videos Permission Allow All
# ATP Steps: 1. Photos popup → 2. Allow all
# ATP Expected: Full gallery accessible; MY GALLERY displayed
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_16 - Photos and Videos Permission Allow All
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_photos_permission_prompt.yaml
- runFlow: subflows/allow_photos_all_permission.yaml
- runFlow: subflows/reach_my_gallery.yaml
