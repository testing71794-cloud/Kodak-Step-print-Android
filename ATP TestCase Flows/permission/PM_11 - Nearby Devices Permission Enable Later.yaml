# TC_ID: PM_11 - Nearby Devices Permission Enable Later
# ATP Steps: 1. Deny Nearby → 2. Settings → enable → 3. Return
# ATP Expected: Nearby permission restored
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_11 - Nearby Devices Permission Enable Later
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_nearby_devices_permission_prompt.yaml
- runFlow: subflows/deny_nearby_devices_permission.yaml
- runFlow: subflows/open_app_settings.yaml
- runFlow: subflows/return_to_app.yaml
- runFlow: subflows/allow_nearby_devices_permission.yaml
- extendedWaitUntil:
    visible: ".*(?i)(send you notifications|access (more )?photos and videos|photos and videos on this device|allow limited access|allow all|my gallery).*"
    timeout: 45000
