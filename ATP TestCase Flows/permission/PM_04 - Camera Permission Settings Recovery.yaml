# TC_ID: PM_04 - Camera Permission Settings Recovery
# ATP Steps: 1. Deny camera → 2. Settings → 3. Grant camera → 4. Return
# ATP Expected: Camera functionality restored
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_04 - Camera Permission Settings Recovery
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_camera_permission_prompt.yaml
- runFlow: subflows/deny_camera_permission.yaml
- runFlow: subflows/wait_for_permission_after_camera.yaml
- runFlow: subflows/open_app_settings.yaml
- runFlow: subflows/enable_camera_in_app_settings.yaml
- runFlow: subflows/return_to_app.yaml
- runFlow: subflows/advance_remaining_permissions_to_gallery.yaml
- runFlow: ../camera/subflows/open_camera_from_gallery.yaml
- extendedWaitUntil:
    visible:
      id: capture_img
    timeout: 45000
- assertVisible:
    id: capture_img
