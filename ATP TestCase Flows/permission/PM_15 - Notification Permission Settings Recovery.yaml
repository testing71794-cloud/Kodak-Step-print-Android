# TC_ID: PM_15 - Notification Permission Settings Recovery
# ATP Steps: 1. Deny notification → 2. Settings → enable → 3. Return
# ATP Expected: Notification permission restored; gallery reached
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_15 - Notification Permission Settings Recovery
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_notification_permission_prompt.yaml
- runFlow: subflows/deny_notification_permission.yaml
- runFlow: subflows/open_app_settings.yaml
- runFlow: subflows/return_to_app.yaml
- runFlow: subflows/finish_permission_flow_to_gallery.yaml
