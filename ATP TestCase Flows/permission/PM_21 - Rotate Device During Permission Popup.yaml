# TC_ID: PM_21 - Rotate Device During Permission Popup
# ATP Steps: 1. Camera popup → 2. Rotate → 3. Allow
# ATP Expected: Permission popup remains functional
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_21 - Rotate Device During Permission Popup
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_camera_permission_prompt.yaml
- setOrientation: LANDSCAPE_LEFT
- waitForAnimationToEnd:
    timeout: 3000
- runFlow: subflows/allow_camera_permission.yaml
- setOrientation: PORTRAIT
- waitForAnimationToEnd:
    timeout: 3000
- runFlow: subflows/advance_remaining_permissions_to_gallery.yaml
