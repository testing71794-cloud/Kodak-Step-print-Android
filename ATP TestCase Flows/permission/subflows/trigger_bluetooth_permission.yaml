appId: com.kodak.steptouch
---
- tapOn:
    id: "imageViewConnection"
- waitForAnimationToEnd:
    timeout: 3000
- runFlow:
    when:
      visible: "Connect"
    commands:
      - tapOn: "Connect"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow: wait_for_nearby_devices_permission_dialog.yaml
