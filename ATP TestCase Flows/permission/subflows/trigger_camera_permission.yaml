appId: com.kodak.steptouch
---
# Gallery → Camera entry; wait for camera runtime permission (not capture UI yet).
- runFlow:
    when:
      visible:
        id: camerIV
    commands:
      - tapOn:
          id: camerIV
- runFlow:
    when:
      notVisible:
        id: capture_img
    commands:
      - swipe:
          start: "12%, 55%"
          end: "82%, 55%"
- runFlow:
    when:
      notVisible:
        id: capture_img
    commands:
      - tapOn:
          point: "88%, 92%"
          label: Camera FAB fallback
- runFlow: wait_for_camera_permission_dialog.yaml
