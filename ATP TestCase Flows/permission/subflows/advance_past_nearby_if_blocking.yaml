appId: com.kodak.steptouch
---
# Location already granted — clear nearby dialog so the app is not left blocked.
- runFlow:
    when:
      visible: ".*(?i)(nearby devices|relative position of nearby).*"
    commands:
      - runFlow: tap_permission_allow_button.yaml
      - extendedWaitUntil:
          notVisible: ".*(?i)(nearby devices|relative position of nearby).*"
          timeout: 45000
