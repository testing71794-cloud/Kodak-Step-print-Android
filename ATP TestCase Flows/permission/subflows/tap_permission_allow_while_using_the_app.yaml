appId: com.kodak.steptouch
---
# Camera + location dialogs (While using the app / Only this time / Don't allow).
- tapOn:
    text: "While using the app"
- tapOn:
    text: "Allow only while using the app"
    optional: true
- tapOn:
    text: "Only this time"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
