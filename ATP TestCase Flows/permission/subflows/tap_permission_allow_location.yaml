appId: com.kodak.steptouch
---
# Location (2/5): Precise is usually pre-selected — tap While using the app first.
- tapOn:
    text: "While using the app"
- tapOn:
    text: "Allow only while using the app"
    optional: true
- runFlow:
    when:
      visible: ".*(?i)access this device.s location.*"
    commands:
      - tapOn:
          text: "Precise"
          optional: true
      - tapOn:
          point: "28%, 38%"
          label: Precise map circle fallback
          optional: true
      - tapOn:
          text: "While using the app"
      - tapOn:
          text: "Allow only while using the app"
          optional: true
- waitForAnimationToEnd:
    timeout: 3000
