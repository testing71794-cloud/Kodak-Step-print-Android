appId: com.kodak.steptouch
---
# Signup → terms → skip tour → first permission dialog (not gallery).
- runFlow:
    when:
      visible: ".*(?i)my gallery.*"
    commands:
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      visible: ".*(?i)permission required.*"
    commands:
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      visible: ".*(?i)(take pictures and record video|access this device.s location|nearby devices|send you notifications|access (more )?photos and videos|photos and videos on this device).*"
    commands:
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      notVisible: ".*(?i)(take pictures and record video|access this device.s location|nearby devices|send you notifications|access (more )?photos and videos|photos and videos on this device|my gallery|permission required).*"
    commands:
      - runFlow: ../../signup-login/subflows/post_launch_through_signup.yaml
      - tapOn:
          text: "I'll do it later"
          optional: true
      - waitForAnimationToEnd:
          timeout: 2000
      - runFlow:
          when:
            visible: "Create an account"
          commands:
            - tapOn: "I'll do it later"
            - waitForAnimationToEnd:
                timeout: 2000
      - runFlow: ../../signup-login/subflows/accept_terms_if_visible.yaml
      - runFlow:
          when:
            visible: "Start a quick tour"
          commands:
            - tapOn: "Start a quick tour"
            - waitForAnimationToEnd:
                timeout: 2000
      - repeat:
          times: 6
          commands:
            - runFlow:
                when:
                  visible: "Skip"
                commands:
                  - tapOn: "Skip"
                  - waitForAnimationToEnd:
                      timeout: 2000
            - runFlow:
                when:
                  visible: "Next"
                commands:
                  - tapOn: "Next"
                  - waitForAnimationToEnd:
                      timeout: 2000
      - extendedWaitUntil:
          visible: ".*(?i)(take pictures and record video|access this device.s location|nearby devices|send you notifications|access (more )?photos and videos|photos and videos on this device).*"
          timeout: 60000
