appId: com.kodak.steptouch
---
# 3/5 — skip if already granted; only act when nearby devices dialog is on screen.
- runFlow:
    when:
      notVisible: ".*(?i)my gallery.*"
    commands:
      - extendedWaitUntil:
          visible: ".*(?i)(nearby devices|relative position of nearby|send you notifications|access (more )?photos and videos|photos and videos on this device|allow limited access|allow all).*"
          timeout: 45000
- runFlow:
    when:
      visible: ".*(?i)(nearby devices|relative position of nearby).*"
    commands:
      - runFlow: tap_permission_allow_button.yaml
      - extendedWaitUntil:
          notVisible: ".*(?i)(nearby devices|relative position of nearby).*"
          timeout: 30000
