appId: com.kodak.steptouch
---
# Nearby denied once: complete chain; on end re-prompt deny again until Permission Required.
- runFlow: allow_notification_permission.yaml
- runFlow: allow_photos_all_permission.yaml
- extendedWaitUntil:
    visible: ".*(?i)(nearby devices|relative position of nearby|my gallery|permission required).*"
    timeout: 45000
- runFlow:
    when:
      visible: ".*(?i)(nearby devices|relative position of nearby).*"
    commands:
      - runFlow: tap_permission_dont_ask_again.yaml
      - extendedWaitUntil:
          notVisible: ".*(?i)(nearby devices|relative position of nearby).*"
          timeout: 30000
- extendedWaitUntil:
    visible: ".*(?i)permission required.*"
    timeout: 45000
