appId: com.kodak.steptouch
---
# Photos dialog: Allow limited access → pick 3 labelled photos → Done.
- tapOn:
    text: "Allow limited access"
    optional: true
- tapOn:
    text: "Select photos"
    optional: true
- tapOn:
    text: "Selected photos"
    optional: true
- runFlow: select_three_photos_in_picker.yaml
- tapOn:
    text: "Allow"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
