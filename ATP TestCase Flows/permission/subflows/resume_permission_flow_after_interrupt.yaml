appId: com.kodak.steptouch
---
# After lock screen / home / task switch: wake app and reach permission or gallery.
# Mid-flow resume: preserve permission state (initial test launch uses clearState: true).
- launchApp:
    clearState: false
    stopApp: false
- waitForAnimationToEnd:
    timeout: 3000
- swipe:
    direction: UP
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: ".*(?i)(create an account|start a quick tour|agree terms).*"
    commands:
      - runFlow: complete_onboarding_for_permission.yaml
- extendedWaitUntil:
    visible: ".*(?i)(take pictures and record video|access this device.s location|nearby devices|send you notifications|access (more )?photos and videos|photos and videos on this device|my gallery|permission required).*"
    timeout: 60000
