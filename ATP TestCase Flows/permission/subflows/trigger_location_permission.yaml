appId: com.kodak.steptouch
---
- tapOn:
    id: "imageViewConnection"
- waitForAnimationToEnd:
    timeout: 3000
- runFlow:
    when:
      visible: "Connect"
    commands:
      - tapOn: "Connect"
      - waitForAnimationToEnd:
          timeout: 3000
- tapOn:
    point: "39%,20%"
    optional: true
    label: Device list entry to trigger location if required
- runFlow: wait_for_location_permission_dialog.yaml
