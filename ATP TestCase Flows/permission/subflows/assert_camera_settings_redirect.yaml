appId: com.kodak.steptouch
---
# Camera blocked: tapping camera must redirect to settings/permission prompt, not capture UI.
- runFlow:
    when:
      visible: ".*(?i)(app battery usage|force stop|permissions).*"
    commands:
      - assertNotVisible:
          id: capture_img
      - assertVisible: ".*(?i)(app battery usage|force stop|permissions).*"
- runFlow:
    when:
      notVisible: ".*(?i)(app battery usage|force stop|permissions).*"
    commands:
      - runFlow:
          when:
            visible: ".*(?i)take pictures and record video.*"
          commands:
            - runFlow: tap_permission_deny.yaml
      - extendedWaitUntil:
          visible: ".*(?i)(my gallery|permission required|some permissions are needed|app battery usage|force stop|permissions).*"
          timeout: 45000
      - runFlow: dismiss_permission_required_if_visible.yaml
      - runFlow:
          when:
            visible:
              id: camerIV
          commands:
            - tapOn:
                id: camerIV
      - runFlow:
          when:
            notVisible:
              id: camerIV
          commands:
            - tapOn:
                point: "88%, 92%"
                label: Camera FAB fallback
      - waitForAnimationToEnd:
          timeout: 3000
      - runFlow:
          when:
            visible: "Phone"
          commands:
            - runFlow: return_to_app.yaml
            - runFlow: dismiss_permission_required_if_visible.yaml
            - tapOn:
                id: camerIV
                optional: true
            - waitForAnimationToEnd:
                timeout: 3000
      - runFlow: dismiss_permission_required_if_visible.yaml
      - extendedWaitUntil:
          visible: ".*(?i)(permission required|some permissions are needed|enable camera|open settings|app battery usage|force stop|permissions).*"
          timeout: 45000
      - assertNotVisible:
          id: capture_img
      - assertVisible: ".*(?i)(permission required|some permissions are needed|enable camera|app battery usage|force stop|permissions).*"
