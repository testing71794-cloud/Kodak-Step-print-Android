appId: com.kodak.steptouch
---
- runFlow: reach_my_gallery.yaml
- runFlow: dismiss_gallery_coachmark_if_visible.yaml
- extendedWaitUntil:
    visible:
      id: textViewAllPhotos
    optional: true
    timeout: 15000
- assertVisible:
    text: ".*(?i)all photos.*"
    optional: true
- extendedWaitUntil:
    visible:
      id: ivItemGridImage
    timeout: 45000
- assertVisible:
    id: ivItemGridImage
    index: 0
- assertVisible:
    id: ivItemGridImage
    index: 1
- assertVisible:
    id: ivItemGridImage
    index: 2
- assertNotVisible:
    id: ivItemGridImage
    index: 3
