appId: com.kodak.steptouch
---
# First-run gallery coachmark after permission flow (not covered by onboarding skip subflow).
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "Ok"
    optional: true
- runFlow: ../../gallery/subflows/close_overlay_if_visible.yaml
- runFlow:
    when:
      visible: "Switch Between"
    commands:
      - tapOn:
          text: "OK"
          optional: true
      - tapOn:
          text: "Ok"
          optional: true
      - tapOn:
          point: "50%, 55%"
          label: Dismiss gallery coachmark backdrop
          optional: true
- waitForAnimationToEnd:
    timeout: 3000
