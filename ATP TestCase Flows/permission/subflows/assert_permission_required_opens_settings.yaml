appId: com.kodak.steptouch
---
# Permission Required modal → OK → Android app settings (not gallery).
- runFlow:
    when:
      visible: ".*(?i)(permissions|force stop|open|uninstall|app info|app battery usage).*"
    commands:
      - assertNotVisible:
          id: capture_img
          optional: true
      - assertVisible: ".*(?i)(permissions|force stop|open).*"
- runFlow:
    when:
      notVisible: ".*(?i)(permissions|force stop|open|uninstall|app info|app battery usage).*"
    commands:
      - extendedWaitUntil:
          visible: ".*(?i)permission required.*"
          timeout: 45000
      - assertVisible: "Permission Required"
      - assertVisible: ".*(?i)some permissions are needed.*"
      - tapOn: "OK"
      - waitForAnimationToEnd:
          timeout: 5000
      - extendedWaitUntil:
          visible: ".*(?i)(permissions|force stop|open|uninstall|app info|app battery usage|manage app).*"
          timeout: 45000
      - assertNotVisible:
          id: capture_img
          optional: true
      - assertVisible: ".*(?i)(permissions|force stop|open).*"
