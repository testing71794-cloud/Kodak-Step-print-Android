appId: com.kodak.steptouch
---
# Recover when a prior run left Android app-info / battery settings in foreground.
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: ".*(?i)(app battery usage|force stop|uninstall|manage battery usage).*"
    commands:
      - pressKey: back
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      notVisible: ".*(?i)(take pictures and record video|access this device.s location|nearby devices|send you notifications|access (more )?photos and videos|photos and videos on this device|my gallery|permission required|create an account|kodak).*"
    commands:
      - runFlow: return_to_app.yaml
