appId: com.kodak.steptouch
---
# Grant only pre-gallery runtime prompts (notification, etc.). Do not tap Allow-all-photos here.
- repeat:
    times: 12
    commands:
      - runFlow:
          when:
            notVisible: "My gallery"
          commands:
            - runFlow: tap_permission_allow.yaml
            - runFlow:
                when:
                  visible: "OK"
                commands:
                  - tapOn:
                      text: "OK"
                      optional: true
                  - tapOn:
                      text: "Ok"
                      optional: true
      - waitForAnimationToEnd:
          timeout: 3000
- extendedWaitUntil:
    visible: "My gallery"
    timeout: 45000