appId: com.kodak.steptouch
---
# Deny camera with don't-ask-again, then deny remaining runtime prompts until Permission Required modal.
- runFlow: prepare_until_camera_permission_prompt.yaml
- runFlow:
    when:
      visible: ".*(?i)take pictures and record video.*"
    commands:
      - runFlow: tap_permission_dont_ask_again.yaml
      - extendedWaitUntil:
          notVisible: ".*(?i)take pictures and record video.*"
          timeout: 30000
- runFlow: reach_permission_required_after_camera_deny.yaml
- extendedWaitUntil:
    visible: ".*(?i)permission required.*"
    timeout: 45000
- assertVisible: "Permission Required"
