appId: com.kodak.steptouch
---
# Open Kodak App info; do not hard-fail on Compose Settings UI (grant via setPermissions next).
- openLink: "app-settings:"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      notVisible: ".*(?i)(permissions|force stop|uninstall|kodak|app info|open).*"
    commands:
      - openLink: "app-settings:"
      - waitForAnimationToEnd:
          timeout: 5000
