appId: com.kodak.steptouch
---
# Select exactly 3 photos by accessibility label, then confirm with Done.
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "Done"
    timeout: 30000
- tapOn: "Photo taken on 10 Jun 2026 4:32.*pm"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn: "Photo taken on 10 Jun 2026 3:58.*pm"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn: "Photo taken on 10 Jun 2026 3:52.*pm"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn: "Done"
- waitForAnimationToEnd:
    timeout: 2000
