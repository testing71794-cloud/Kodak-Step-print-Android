appId: com.kodak.steptouch
---
# 2/5 — skip if already granted; only act when location dialog is on screen.
- runFlow:
    when:
      notVisible: ".*(?i)my gallery.*"
    commands:
      - extendedWaitUntil:
          visible: ".*(?i)(access this device.s location|nearby devices|relative position of nearby|send you notifications|access (more )?photos and videos|photos and videos on this device).*"
          timeout: 45000
- runFlow:
    when:
      visible: ".*(?i)access this device.s location.*"
    commands:
      - runFlow: tap_permission_allow_location.yaml
      - extendedWaitUntil:
          notVisible: ".*(?i)access this device.s location.*"
          timeout: 30000
