appId: com.kodak.steptouch
---
# After camera deny, grant remaining permissions until Permission Required appears.
- runFlow: dismiss_permission_required_if_visible.yaml
- runFlow: allow_location_permission.yaml
- runFlow: allow_nearby_devices_permission.yaml
- runFlow:
    when:
      notVisible: ".*(?i)permission required.*"
    commands:
      - extendedWaitUntil:
          visible: ".*(?i)(send you notifications|access (more )?photos and videos|photos and videos on this device|allow limited access|allow all|don.t allow|don.t select more|permission required).*"
          timeout: 45000
- runFlow: allow_notification_permission.yaml
- runFlow:
    when:
      notVisible: ".*(?i)permission required.*"
    commands:
      - extendedWaitUntil:
          visible: ".*(?i)(access (more )?photos and videos|photos and videos on this device|allow limited access|allow all|don.t allow|don.t select more|permission required).*"
          timeout: 45000
- runFlow: allow_photos_all_permission.yaml
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: ".*(?i)permission required.*"
    timeout: 45000
