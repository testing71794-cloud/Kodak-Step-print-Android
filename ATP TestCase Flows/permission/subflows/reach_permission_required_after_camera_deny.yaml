appId: com.kodak.steptouch
---
# Camera denied: deny subsequent runtime prompts until in-app Permission Required modal.
- repeat:
    times: 4
    commands:
      - runFlow:
          when:
            visible: ".*(?i)access this device.s location.*"
          commands:
            - runFlow: tap_permission_deny.yaml
            - waitForAnimationToEnd:
                timeout: 3000
      - runFlow:
          when:
            visible: ".*(?i)(nearby devices|relative position of nearby).*"
          commands:
            - runFlow: tap_permission_deny.yaml
            - waitForAnimationToEnd:
                timeout: 3000
      - runFlow:
          when:
            visible: ".*(?i)send you notifications.*"
          commands:
            - runFlow: tap_permission_deny.yaml
            - waitForAnimationToEnd:
                timeout: 3000
      - runFlow:
          when:
            visible: ".*(?i)(access (more )?photos and videos|photos and videos on this device|allow limited access|allow all).*"
          commands:
            - runFlow: tap_permission_deny_photos.yaml
            - waitForAnimationToEnd:
                timeout: 3000
      - runFlow:
          when:
            visible: ".*(?i)permission required.*"
          commands:
            - assertVisible: "Permission Required"
- extendedWaitUntil:
    visible: ".*(?i)permission required.*"
    timeout: 45000
