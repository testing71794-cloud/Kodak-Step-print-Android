appId: com.kodak.steptouch
---
# Dismiss marketing/intro overlays only (not Android permission dialogs).
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Get started"
    optional: true
- tapOn:
    text: "Let's go"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
