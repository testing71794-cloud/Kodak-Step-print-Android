appId: com.kodak.steptouch
---
# Notification denied once: finish photos; on end re-prompt deny again until Permission Required.
- runFlow: allow_photos_all_permission.yaml
- extendedWaitUntil:
    visible: ".*(?i)(send you notifications|my gallery|permission required).*"
    timeout: 45000
- runFlow:
    when:
      visible: ".*(?i)send you notifications.*"
    commands:
      - runFlow: tap_permission_dont_ask_again.yaml
      - extendedWaitUntil:
          notVisible: ".*(?i)send you notifications.*"
          timeout: 30000
- extendedWaitUntil:
    visible: ".*(?i)permission required.*"
    timeout: 45000
