# TC_ID: PM_18 - Photos and Videos Permission Deny
# ATP Steps: 1. Photos popup → 2. Don't allow (first time)
# ATP Expected: Gallery not accessible; retry or blocked state shown
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_18 - Photos and Videos Permission Deny
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_photos_permission_prompt.yaml
- runFlow: subflows/deny_photos_permission.yaml
- extendedWaitUntil:
    visible: ".*(?i)(my gallery|permission required|some permissions are needed|access (more )?photos and videos|photos and videos on this device).*"
    timeout: 45000
