# TC_ID: PM_01 - Camera Permission Allow
# ATP Steps: 1. Camera permission popup appears → 2. Tap Allow → 3. Open camera from gallery
# ATP Expected: Camera permission granted and camera opens successfully
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_01 - Camera Permission Allow
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_camera_permission_prompt.yaml
- runFlow: subflows/allow_camera_permission.yaml
- runFlow: subflows/advance_remaining_permissions_to_gallery.yaml
- runFlow: ../camera/subflows/open_camera_from_gallery.yaml
- extendedWaitUntil:
    visible:
      id: capture_img
    timeout: 45000
- assertVisible:
    id: capture_img
