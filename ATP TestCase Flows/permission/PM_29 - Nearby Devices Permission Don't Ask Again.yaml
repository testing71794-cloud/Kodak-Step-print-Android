# TC_ID: PM_29 - Nearby Devices Permission Don't Ask Again
# ATP Steps: 1. Nearby popup → 2. Deny → 3. Complete flow → 4. Deny again on re-prompt
# ATP Expected: Permission Required → OK → Android Settings
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_29 - Nearby Devices Permission Don't Ask Again
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_nearby_devices_permission_prompt.yaml
- runFlow: subflows/deny_nearby_devices_permission.yaml
- runFlow: subflows/reach_permission_required_after_nearby_deny.yaml
- runFlow: subflows/assert_permission_required_opens_settings.yaml
