# TC_ID: PM_09 - Nearby Devices Permission Allow
# ATP Steps: 1. Allow Camera + Location → 2. Nearby popup → 3. Allow
# ATP Expected: Nearby granted; next permission dialog appears
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_09 - Nearby Devices Permission Allow
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_nearby_devices_permission_prompt.yaml
- runFlow: subflows/allow_nearby_devices_permission.yaml
- extendedWaitUntil:
    visible: ".*(?i)(send you notifications|access (more )?photos and videos|photos and videos on this device|allow limited access|allow all|my gallery).*"
    timeout: 45000
