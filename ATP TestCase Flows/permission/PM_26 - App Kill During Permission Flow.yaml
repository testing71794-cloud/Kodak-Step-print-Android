# TC_ID: PM_26 - App Kill During Permission Flow
# ATP Steps: 1. Camera popup → 2. Force close → 3. Reopen → 4. Continue
# ATP Expected: Permission flow resumes appropriately
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_26 - App Kill During Permission Flow
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_camera_permission_prompt.yaml
- stopApp
# Mid-flow relaunch: preserve permission state (test starts with clearState: true above).
- launchApp:
    clearState: false
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/resume_permission_flow_after_interrupt.yaml
- runFlow: subflows/allow_all_permissions_sequence.yaml
