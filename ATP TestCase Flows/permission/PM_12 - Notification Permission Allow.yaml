# TC_ID: PM_12 - Notification Permission Allow
# ATP Steps: 1. Allow upstream → 2. Notification popup → 3. Allow
# ATP Expected: Notification granted; Photos dialog next; MY GALLERY reached
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_12 - Notification Permission Allow
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_notification_permission_prompt.yaml
- runFlow: subflows/allow_notification_permission.yaml
- runFlow: subflows/finish_permission_flow_to_gallery.yaml
