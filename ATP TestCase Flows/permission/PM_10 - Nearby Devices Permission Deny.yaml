# TC_ID: PM_10 - Nearby Devices Permission Deny
# ATP Steps: 1. Nearby popup → 2. Don't allow
# ATP Expected: Flow continues on first deny
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_10 - Nearby Devices Permission Deny
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_nearby_devices_permission_prompt.yaml
- runFlow: subflows/deny_nearby_devices_permission.yaml
- extendedWaitUntil:
    visible: ".*(?i)(send you notifications|access (more )?photos and videos|photos and videos on this device|allow limited access|allow all|my gallery).*"
    timeout: 45000
