# TC_ID: PM_08 - Location Permission Don't Ask Again
# ATP Steps: 1. Location popup → 2. Don't ask again + deny
# ATP Expected: Permission Required → Settings when location needed
# Precondition: launchApp clearState: true, permissions all: deny
appId: com.kodak.steptouch
name: PM_08 - Location Permission Don't Ask Again
---
- launchApp:
    clearState: true
    permissions:
      all: deny
- runFlow: subflows/dismiss_app_intro_if_visible.yaml
- runFlow: subflows/prepare_until_location_permission_prompt.yaml
- runFlow:
    when:
      visible: ".*(?i)access this device.s location.*"
    commands:
      - runFlow: subflows/tap_permission_dont_ask_again.yaml
      - extendedWaitUntil:
          notVisible: ".*(?i)access this device.s location.*"
          timeout: 30000
- runFlow:
    when:
      visible: ".*(?i)permission required.*"
    commands:
      - runFlow: subflows/assert_permission_required_opens_settings.yaml
- runFlow:
    when:
      notVisible: ".*(?i)permission required.*"
    commands:
      - extendedWaitUntil:
          visible: ".*(?i)(nearby devices|relative position of nearby|send you notifications|access (more )?photos and videos|photos and videos on this device|my gallery).*"
          timeout: 45000
