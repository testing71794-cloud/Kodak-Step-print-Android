# TC_ID: GA_11 - Open photo then edit and save
appId: com.kodak.steptouch
name: GA_11 - Open photo then edit and save
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/open_photo.yaml
- runFlow: subflows/close_overlay_if_visible.yaml
- tapOn:
    id: "linearlayout_edit_photo"
    repeat: 2
    delay: 200
- extendedWaitUntil:
    visible:
      id: "filterEditingOptionsImageView"
    timeout: 2000
- tapOn:
    id: "filterEditingOptionsImageView"
    index: 4
- runFlow:
    when:
      visible:
        id: "saveRecentEditImageView"
    commands:
      - tapOn:
          id: "saveRecentEditImageView"
- tapOn: "Done"
- tapOn:
    id: "image_cross"
    optional: true
- tapOn: "SAVE"
- assertVisible: "MY GALLERY"
