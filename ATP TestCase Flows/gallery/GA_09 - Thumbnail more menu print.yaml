# TC_ID: GA_09 - Thumbnail more menu print (not connected)
appId: com.kodak.steptouch
name: GA_09 - Thumbnail more menu print
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/wait_for_gallery_grid.yaml
- runFlow: subflows/thumbnail_more_menu.yaml
- tapOn:
    id: "imagePrintPreview"
    optional: true
- tapOn:
    text: ".*(?i)print.*"
    optional: true
- tapOn:
    text: "Print"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)(connect|printer|bluetooth|not connected).*"
    timeout: 2000
    optional: true
