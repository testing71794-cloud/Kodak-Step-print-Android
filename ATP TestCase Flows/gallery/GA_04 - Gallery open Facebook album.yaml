# TC_ID: GA_04 - Gallery open Facebook album
appId: com.kodak.steptouch
name: GA_04 - Gallery open Facebook album
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_gallery.yaml
- runFlow: subflows/open_gallery_dropdown.yaml
- tapOn:
    text: "Facebook"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Log in"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)facebook.*"
    timeout: 2000
    optional: true
- tapOn: "CONNECT"
