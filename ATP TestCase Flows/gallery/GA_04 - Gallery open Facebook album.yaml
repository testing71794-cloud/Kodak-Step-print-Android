# TC_ID: GA_04 - Gallery open Facebook album
appId: com.kodak.steptouch
name: GA_04 - Gallery open Facebook album
---
- launchApp
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- tapOn: "MY GALLERY"
- scrollUntilVisible:
    element:
      text: "Facebook"
- tapOn: "Facebook"
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Log in"
    optional: true
- tapOn:
    text: "CONNECT"
    optional: true       
- extendedWaitUntil:
    visible:
      text: ".*(?i)facebook.*"
    timeout: 2000
    optional: true
- tapOn:
    point: 23%,15%
- tapOn:
    id: "ivItemGridImage"   
- assertVisible: "Edit"
- assertVisible: "Collage"
- assertVisible: "Print"
    