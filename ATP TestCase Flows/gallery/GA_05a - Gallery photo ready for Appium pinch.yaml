# TC_ID: GA_05a - Gallery photo detail ready for Appium W3C pinch (zoom out)
# Full GA_05: scripts\run_ga05_real_pinch.bat [DEVICE]
appId: com.kodak.steptouch
name: GA_05a - Gallery photo ready for Appium pinch
---
- launchApp
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "MY GALLERY"
    timeout: 15000
- tapOn: "MY GALLERY"
- runFlow: subflows/wait_for_gallery_grid.yaml
- runFlow: subflows/gallery_photo_detail_for_pinch.yaml
- tapOn:
    id: "camera_image"
    optional: true
- takeScreenshot: GA_05_before_pinch
