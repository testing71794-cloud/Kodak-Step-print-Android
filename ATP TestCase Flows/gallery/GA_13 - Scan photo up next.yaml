# TC_ID: GA_13 - Scan photo (up next)
appId: com.kodak.steptouch
name: GA_13 - Scan photo up next
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/wait_for_gallery_grid.yaml
- runFlow: subflows/tap_up_next.yaml
- extendedWaitUntil:
    visible:
      text: ".*(?i)(scan|camera|ar).*"
    timeout: 2000
    optional: true
