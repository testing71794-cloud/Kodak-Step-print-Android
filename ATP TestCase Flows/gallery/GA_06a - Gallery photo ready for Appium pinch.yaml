# TC_ID: GA_06a - Gallery photo detail ready for Appium W3C pinch (zoom in)
# Full GA_06: scripts\run_ga06_real_pinch.bat [DEVICE]
appId: com.kodak.steptouch
name: GA_06a - Gallery photo ready for Appium pinch
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/wait_for_gallery_grid.yaml
- runFlow: subflows/gallery_photo_detail_for_pinch.yaml
- tapOn:
    id: "camera_image"
    optional: true
- takeScreenshot: GA_06_before_pinch
- tapOn:
    point: "50%, 46%"
    label: Focus photo preview before Appium pinch
