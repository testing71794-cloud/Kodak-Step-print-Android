# TC_ID: GA_10 - Share photo
# ATP Steps: Select → 2 photos → Share → Photos → Upload → verify share started
# ATP Expected: User can share selected gallery photos via Google Photos upload
appId: com.kodak.steptouch
name: GA_10 - Share photo
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Share with"
    commands:
      - pressKey: back
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- tapOn: "MY GALLERY"
- runFlow: subflows/wait_for_gallery_grid.yaml
- assertVisible:
    id: "ivItemGridImage"
- runFlow: subflows/enter_gallery_select_mode.yaml
- runFlow: subflows/select_two_photos.yaml
- assertVisible:
    id: linearLayoutSharePhotos
- runFlow: subflows/share_two_photos_via_photos.yaml
- runFlow: subflows/exit_gallery_select_mode.yaml
- assertVisible: "MY GALLERY"
