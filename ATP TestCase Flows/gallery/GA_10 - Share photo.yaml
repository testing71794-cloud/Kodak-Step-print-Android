# TC_ID: GA_10 - Share photo
appId: com.kodak.steptouch
name: GA_10 - Share photo
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_gallery.yaml
- tapOn: "Select"
- tapOn:
    point: "30%, 35%"
- tapOn:
    point: "70%, 35%"
- tapOn:
    point: "90%, 8%"
- swipe:
    start: "50%, 80%"
    end: "50%, 30%"
- assertVisible: "Sharing image"

