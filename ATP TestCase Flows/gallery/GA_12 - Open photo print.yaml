# TC_ID: GA_12 - Open photo print
appId: com.kodak.steptouch
name: GA_12 - Open photo print
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/open_photo.yaml
- runFlow: subflows/close_overlay_if_visible.yaml
- tapOn:
    point: "88%, 92%"
    label: Print bottom-right
    optional: true
- tapOn: "Print"
  optional: true
- tapOn:
    id: "textViewPrint"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)(connect|printer|print|not connected).*"
    timeout: 2000
    optional: true
