appId: com.kodak.steptouch
---
# Maestro preamble for GA_05 Appium pinch-close (zoom out). Zoom-in setup is done in Appium session.
- launchApp
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "MY GALLERY"
    timeout: 15000
- tapOn: "MY GALLERY"
- runFlow: wait_for_gallery_grid.yaml
- runFlow: gallery_photo_detail_for_pinch.yaml
- tapOn:
    id: "camera_image"
    optional: true
- takeScreenshot: GA_05_before_appium
