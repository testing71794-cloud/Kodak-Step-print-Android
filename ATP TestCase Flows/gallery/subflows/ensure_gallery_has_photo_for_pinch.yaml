appId: com.kodak.steptouch
---
# Pinch tests need at least one MY GALLERY thumbnail (cold start after pm clear is often empty).
- extendedWaitUntil:
    visible:
      id: "ivItemGridImage"
    timeout: 8000
    optional: true
- runFlow:
    when:
      notVisible:
        id: "ivItemGridImage"
    commands:
      - runFlow: ../../precut/subflows/capture_in_app_photo_to_gallery.yaml
      - extendedWaitUntil:
          visible:
            id: "ivItemGridImage"
          timeout: 30000
