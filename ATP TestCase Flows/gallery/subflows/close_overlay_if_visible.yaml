appId: com.kodak.steptouch
---
- runFlow:
    when:
      visible: "Time to Fine-Tune"
    commands:
      - tapOn:
          text: "Ok"
          optional: true
      - tapOn:
          text: "OK"
          optional: true
- tapOn:
    text: "Ok"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "X"
    optional: true
- tapOn:
    text: "Close"
    optional: true
