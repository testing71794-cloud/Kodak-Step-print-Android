appId: com.kodak.steptouch
---
# Android share sheet → Google Photos → Upload (2 selected gallery photos).
- tapOn:
    id: linearLayoutSharePhotos
- extendedWaitUntil:
    visible:
      text: ".*(?i)(just once|share with|use a different app).*"
    timeout: 8000
- runFlow:
    when:
      visible: "Share with Photos"
    commands:
      - tapOn: "Just once"
- runFlow:
    when:
      visible: "Use a different app"
    commands:
      - scrollUntilVisible:
          element:
            text: "Photos"
      - tapOn: "Photos"
- extendedWaitUntil:
    visible: "Upload to Photos"
    timeout: 8000
- tapOn: "Upload"
- extendedWaitUntil:
    visible:
      text: ".*(?i)(uploading photos|sharing image).*"
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: cancelText
    timeout: 30000
