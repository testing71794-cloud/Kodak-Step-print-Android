appId: com.kodak.steptouch
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible: "MY GALLERY"
    timeout: 10000
- tapOn: "MY GALLERY"
- runFlow: wait_for_gallery_grid.yaml
- runFlow: enter_gallery_select_mode.yaml
- runFlow: select_two_photos.yaml
- tapOn:
    point: "90%, 8%"
    label: Share
- waitForAnimationToEnd:
    timeout: 3000
