appId: com.kodak.steptouch
---
- extendedWaitUntil:
    visible:
      id: "ivItemGridImage"
    timeout: 15000
    optional: true
- runFlow:
    when:
      notVisible:
        id: "ivItemGridImage"
    commands:
      - tapOn:
          point: "50%, 28%"
          label: Gallery view option 2
          optional: true
- extendedWaitUntil:
    visible:
      id: "ivItemGridImage"
    timeout: 30000
