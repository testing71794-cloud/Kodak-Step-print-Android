appId: com.kodak.steptouch
---
# Structural pre-check before OpenRouter vision verify.
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "MY GALLERY"
- extendedWaitUntil:
    visible:
      id: "ivItemGridImage"
    timeout: 10000
- assertVisible:
    id: "ivItemGridImage"
# OpenRouter vision verify (not Maestro Cloud assertWithAI).
# Studio: run scripts/start_maestro_verify_server.bat first (adb live capture fallback).
# CLI/Jenkins: screenshot in reports/gallery/maestro-debug or GraalJS adb capture.
- takeScreenshot: GA_02_3x3_grid_verify
- runScript:
    file: ../scripts/verify_gallery_3x3_openrouter.js
    env:
      SCREENSHOT_BASENAME: GA_02_3x3_grid_verify
- assertTrue: ${output.grid_3x3_verified}
