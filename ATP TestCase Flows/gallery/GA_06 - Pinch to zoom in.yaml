# TC_ID: GA_06 - Pinch to zoom in
# Appium (Jenkins): scripts\run_ga06_real_pinch.bat — pinchOpenGesture zoom IN only.
# Maestro-only fallback when ATP_GALLERY_APPIUM_PINCH=0 uses subflow below.
appId: com.kodak.steptouch
name: GA_06 - Pinch to zoom in
---
- launchApp
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "MY GALLERY"
    timeout: 15000
- tapOn: "MY GALLERY"
- runFlow: subflows/wait_for_gallery_grid.yaml
- runFlow: subflows/gallery_photo_detail_for_pinch.yaml
- runFlow: subflows/pinch_gallery_zoom_in_maestro_approx.yaml
