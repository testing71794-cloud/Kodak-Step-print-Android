# TC_ID: GA_06 - Pinch to zoom in
# Maestro-only paired swipes are NOT real multitouch.
# Real W3C pinch: scripts\run_ga06_real_pinch.bat [DEVICE]
appId: com.kodak.steptouch
name: GA_06 - Pinch to zoom in
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/wait_for_gallery_grid.yaml
- runFlow: subflows/gallery_photo_detail_for_pinch.yaml
- runFlow: subflows/pinch_gallery_zoom_in_maestro_approx.yaml
