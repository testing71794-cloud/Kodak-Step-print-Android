# TC_ID: GA_06 - Pinch to zoom in
appId: com.kodak.steptouch
name: GA_06 - Pinch to zoom in
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/wait_for_gallery_grid.yaml
- tapOn:
    id: "ivItemGridImage"
    index: 4
- swipe:
    start: "75%, 75%"
    end: "50%, 50%"
    label: Zoom-in gesture part 1
- swipe:
    start: "25%, 25%"
    end: "50%, 50%"
    label: Zoom-in gesture part 2
- waitForAnimationToEnd:
    timeout: 2000
