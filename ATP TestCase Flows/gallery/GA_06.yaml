appId: com.kodak.steptouch
name: GA_06 - Pinch to zoom in
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible: "MY GALLERY"
- tapOn:
    id: "ivItemGridImage"
    index: 4
- swipe:
    start: "75%, 75%"
    end: "50%, 50%"
    label: Zoom-in gesture part 1
- swipe:
    start: "25%, 25%"
    end: "50%, 50%"
    label: Zoom-in gesture part 2
- waitForAnimationToEnd:
    timeout: 2000
