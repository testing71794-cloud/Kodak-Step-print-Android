# TC_ID: GA_03 - Gallery select album
appId: com.kodak.steptouch
name: GA_03 - Gallery select album
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/wait_for_gallery_grid.yaml
- tapOn: "MY GALLERY"
- scrollUntilVisible:
    element:
      text: "Camera"
    direction: DOWN
    timeout: 10000

- assertVisible:
    text: "Camera"

- tapOn:
    text: "Camera"
- waitForAnimationToEnd
- assertVisible:
    id: "ivItemGridImage"
    index: 4
- tapOn:
    id: "ivItemGridImage"
    index: 3
- tapOn:
    id: "edit_layout"
