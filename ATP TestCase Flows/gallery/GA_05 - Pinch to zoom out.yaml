# TC_ID: GA_05 - Pinch to zoom out
appId: com.kodak.steptouch
name: GA_05 - Pinch to zoom out
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/wait_for_gallery_grid.yaml
- tapOn:
    id: "ivItemGridImage"
    index: 4
- swipe:
    start: "50%, 50%"
    end: "75%, 75%"
    label: Zoom-out gesture part 1
- swipe:
    start: "50%, 50%"
    end: "25%, 25%"
    label: Zoom-out gesture part 2
- waitForAnimationToEnd:
    timeout: 2000
