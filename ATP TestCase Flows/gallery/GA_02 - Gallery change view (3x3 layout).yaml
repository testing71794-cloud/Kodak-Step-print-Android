# TC_ID: GA_02 - Gallery change view (3x3 layout)
appId: com.kodak.steptouch
name: GA_02 - Gallery change view (3x3 layout)
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/wait_for_gallery_grid.yaml
- tapOn: "MY GALLERY"
- tapOn:
    id: "imageViewSecondLevelGridView"
- runFlow: subflows/verify_gallery_3x3_grid.yaml

