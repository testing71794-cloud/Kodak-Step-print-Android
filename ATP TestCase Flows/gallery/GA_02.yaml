appId: com.kodak.steptouch
name: GA_02 - Gallery change view (3x3 layout)
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_gallery.yaml
- runFlow: subflows/open_gallery_dropdown.yaml
- tapOn:
    id: "imageViewThirdLevelGridView"
- assertVisible:
    id: "ivItemGridImage"

- tapOn: "MY GALLERY"
- assertVisible:
    id: "imageViewThirdLevelGridView"
