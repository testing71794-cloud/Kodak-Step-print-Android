appId: com.kodak.steptouch
---
# Gallery top-right printer icon — CONNECTED (colored Kodak icon).
# Reference: assets/gallery_printer_icon_connected.png
# Disconnected = grey/white icon + red Bluetooth badge (see gallery_printer_icon_disconnected.png).
- assertVisible:
    id: "imageViewConnection"
- extendedWaitUntil:
    visible:
      id: "linearLayoutConnection"
    timeout: 2000
- assertNotVisible:
    text: "Printer Not Connected"
