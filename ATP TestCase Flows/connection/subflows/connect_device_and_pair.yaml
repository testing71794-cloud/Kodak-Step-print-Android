appId: com.kodak.steptouch
---
# Steps 5–6: pick available device → confirm pairing (same fallback as CO_01).
- runFlow:
    when:
      visible:
        text: ${BT_DEVICE_NAME}
    commands:
      - tapOn:
          text: ${BT_DEVICE_NAME}
- runFlow:
    when:
      notVisible:
        text: ${BT_DEVICE_NAME}
    commands:
      - tapOn:
          point: "39%,20%"
          label: Device list entry fallback
- runFlow: pairing_optional.yaml
