appId: com.kodak.steptouch
name: CO_04_Auto_Connect
---
# ATP CO_04 – Printer already bonded & powered on; opening app should auto-connect.
# Uses clearState: false so prior pairing/app data can remain (adjust if your harness resets BT).
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow: ../signup-login/subflows/post_launch_through_signup.yaml
- runFlow: ../signup-login/handle_optional_permissions_loop.yaml
- runFlow: ../signup-login/subflows/accept_terms_if_visible.yaml
# Land on main gallery (session may skip auth if still logged in).
- extendedWaitUntil:
    visible: "My gallery"
    timeout: 90000
- assertVisible:
    text: "Connected"
    optional: true
    label: Soft assertion – UI copy varies by build
