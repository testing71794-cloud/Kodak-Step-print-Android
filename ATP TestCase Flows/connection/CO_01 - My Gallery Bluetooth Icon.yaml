# TC_ID: CO_01 - My Gallery Bluetooth Icon
appId: com.kodak.steptouch
name: CO_01 - My Gallery Bluetooth Icon
---
# ATP CO_01 – Connect from gallery via Bluetooth entry (top-right).
# Requires a discoverable printer and env BT_DEVICE_NAME matching the list entry.
# Example: maestro test ... -e BT_DEVICE_NAME="Kodak Step Touch"
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible: "My gallery"
- tapOn:
    id: "ivItemGridImage"

# Icon is often image-only; tune X%/Y% after inspecting your gallery toolbar.
- tapOn:
    id: "imageViewConnection"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    point: 39%,20%
- waitForAnimationToEnd:
    timeout: 2000

- runFlow: subflows/pairing_optional.yaml
- tapOn:
    text: "OK"
    optional: true
- assertVisible:
    id: "linearLayoutConnection"
