# TC_ID: CO_02 - Thumbnail Quick Print
# ATP Steps: 1. Open app → 2. more (top-left on thumbnail) → 3. printer icon → 4. Connect on popup → 5. pick device → 6. confirm pairing
# ATP Expected: User should be able to pair through the quick print button
# Env: BT_DEVICE_NAME
appId: com.kodak.steptouch
name: CO_02 - Thumbnail Quick Print
---
- launchApp:
    clearState: true
- runFlow: ../signup-login/subflows/reach_gallery_after_onboarding_skip.yaml
- assertVisible: "My gallery"
# Step 2: more button top-left on photo thumbnail.
- tapOn:
    id: "linearLayout_threeDot"
    index: 2
- tapOn:
    id: "linearLayout_threeDot"
    index: 2
# Step 3: printer icon.
- tapOn:
    id: "imagePrintPreview"
# Step 4: printer not connected popup → Connect.
- assertVisible: "Printer Not Connected"
- tapOn: "Connect"
- tapOn:
    point: 39%,20%
- waitForAnimationToEnd:
    timeout: 2000

- runFlow: subflows/pairing_optional.yaml
- tapOn:
    text: "OK"
    optional: true
- assertVisible:
    id: "linearLayoutConnection"

